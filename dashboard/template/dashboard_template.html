                        generatedArticles.set(sourceItemId, { articleId: data.id, status: 'completed' });
                        // Update button if still in DOM
                        const liveBtn = document.querySelector(`[data-source-item-id="${sourceItemId}"]`);

                            liveBtn.textContent = t('view_article');

                            liveBtn.disabled = false;

                    } else if (article.status === 'failed') {

                        if (liveBtn) {
                            liveBtn.className = 'gen-article-btn failed';

                                liveBtn.textContent = t('generate_article');
                                liveBtn.disabled = false;
                            }, 5000);

                    }

            }, 5000);
        } else {
            throw new Error(data.error || 'Unknown error');
        }
    } catch (err) {
        generatedArticles.delete(sourceItemId);
        btn.className = 'gen-article-btn failed';
        btn.textContent = t('generation_failed');
        setTimeout(() => {
            btn.className = 'gen-article-btn';
            btn.textContent = t('generate_article');
            btn.disabled = false;
        }, 5000);

}

function saveArticleAsMarkdown(articleId, filename) {
    const overlay = document.getElementById('article-modal-overlay');
    if (!overlay) return;
    const iframe = overlay.querySelector('iframe');
    if (!iframe || !iframe.contentDocument) return;

    const doc = iframe.contentDocument.cloneNode(true);
    // Strip unwanted elements (same cleanup as download)
    doc.querySelectorAll('script, nav, header, footer, .breadcrumb, .category-badge').forEach(el => el.remove());
    doc.querySelectorAll('script[type="application/ld+json"]').forEach(el => el.remove());
    doc.querySelectorAll('.inline-comment-highlight').forEach(el => {
        const parent = el.parentNode;
        while (el.firstChild) parent.insertBefore(el.firstChild, el);
        parent.removeChild(el);
    });
    const walker = doc.createTreeWalker(doc, NodeFilter.SHOW_COMMENT);
    const htmlComments = [];
    while (walker.nextNode()) htmlComments.push(walker.currentNode);
    htmlComments.forEach(c => c.parentNode.removeChild(c));

    const articleEl = doc.querySelector('article') || doc.body;
    const md = _htmlToMarkdown(articleEl);

    const blob = new Blob([md], { type: 'text/markdown;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const safeName = filename.replace(/[^a-zA-Z0-9äöüÄÖÜß\-_ ]/g, '').replace(/\s+/g, '-').slice(0, 60);
    a.href = url;
    a.download = safeName + '.md';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

function _htmlToMarkdown(el) {
    let md = '';
    for (const node of el.childNodes) {
        if (node.nodeType === Node.TEXT_NODE) {
            md += node.textContent;
            continue;
        }
        if (node.nodeType !== Node.ELEMENT_NODE) continue;
        const tag = node.tagName.toLowerCase();
        if (['style', 'script', 'nav', 'footer'].includes(tag)) continue;

        if (/^h([1-4])$/.test(tag)) {
            const level = parseInt(tag[1]);
            md += '\n' + '#'.repeat(level) + ' ' + _mdInline(node) + '\n\n';
        } else if (tag === 'p') {
            md += _mdInline(node) + '\n\n';
        } else if (tag === 'ul') {
            md += _mdList(node, '-') + '\n';
        } else if (tag === 'ol') {
            md += _mdList(node, '1.') + '\n';
        } else if (tag === 'blockquote') {
            const inner = _htmlToMarkdown(node).trim().split('\n').map(l => '> ' + l).join('\n');
            md += inner + '\n\n';
        } else if (tag === 'img') {
            const alt = node.getAttribute('alt') || '';
            const src = node.getAttribute('src') || '';
            md += `![${alt}](${src})\n\n`;
        } else if (tag === 'hr') {
            md += '---\n\n';
        } else if (tag === 'table') {
            md += _mdTable(node) + '\n\n';
        } else if (tag === 'br') {
            md += '\n';
        } else if (['div', 'section', 'article', 'main', 'figure', 'figcaption'].includes(tag)) {
            md += _htmlToMarkdown(node);
        } else {
            md += _mdInline(node);
        }
    }
    return md;
}

function _mdInline(el) {
    let out = '';
    for (const node of el.childNodes) {
        if (node.nodeType === Node.TEXT_NODE) { out += node.textContent; continue; }
        if (node.nodeType !== Node.ELEMENT_NODE) continue;
        const tag = node.tagName.toLowerCase();
        const inner = _mdInline(node);
        if (tag === 'strong' || tag === 'b') out += '**' + inner + '**';
        else if (tag === 'em' || tag === 'i') out += '*' + inner + '*';
        else if (tag === 'code') out += '`' + inner + '`';
        else if (tag === 'a') out += '[' + inner + '](' + (node.getAttribute('href') || '') + ')';
        else if (tag === 'br') out += '\n';
        else if (tag === 'img') out += '![' + (node.getAttribute('alt') || '') + '](' + (node.getAttribute('src') || '') + ')';
        else out += inner;
    }
    return out;
}

function _mdList(ul, marker) {
    let out = '';
    for (const li of ul.children) {
        if (li.tagName.toLowerCase() !== 'li') continue;
        // Separate nested lists from text content
        const nested = li.querySelector('ul, ol');
        let text = '';
        for (const child of li.childNodes) {
            if (child.nodeType === Node.ELEMENT_NODE && (child.tagName === 'UL' || child.tagName === 'OL')) continue;
            text += child.nodeType === Node.TEXT_NODE ? child.textContent : _mdInline(child);
        }
        out += marker + ' ' + text.trim() + '\n';
        if (nested) {
            const nestedMarker = nested.tagName.toLowerCase() === 'ol' ? '1.' : '-';
            const nestedMd = _mdList(nested, nestedMarker).split('\n').filter(Boolean).map(l => '  ' + l).join('\n');
            out += nestedMd + '\n';
        }
    }
    return out;
}

function _mdTable(table) {
    const rows = Array.from(table.querySelectorAll('tr'));
    if (rows.length === 0) return '';
    let out = '';
    rows.forEach((row, i) => {
        const cells = Array.from(row.querySelectorAll('th, td')).map(c => _mdInline(c).trim());
        out += '| ' + cells.join(' | ') + ' |\n';
        if (i === 0) out += '| ' + cells.map(() => '---').join(' | ') + ' |\n';
    });
    return out;
}

async function handleBatchRegenerate() {
    if (!confirm('This will regenerate ALL approved/published articles with fresh content and images. Current versions will be saved as snapshots. Continue?')) return;

    const btn = document.getElementById('btn-batch-regen');
    if (!btn) return;
    btn.disabled = true;
    btn.innerHTML = '&#8987; Starting batch...';

    try {
        const res = await fetch('/api/blog-article', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'regenerate_batch' }),
        });
        const data = await res.json();
        if (!res.ok || data.error) {
            showToast(data.error || 'Batch regeneration failed', 'error');
            btn.disabled = false;
            btn.innerHTML = '&#8635; Regenerate All Published';
            return;
        }
        showToast('Batch regeneration started: ' + data.total + ' articles');
        btn.innerHTML = '&#8987; Regenerating ' + data.total + ' articles...';

        let polls = 0;
        const poll = setInterval(async () => {
            polls++;
            if (polls > 180) {
                clearInterval(poll);
                btn.disabled = false;
                btn.innerHTML = '&#8635; Regenerate All Published';
                return;
            }
            try {
                const checkRes = await fetch('/api/blog-article');
                const checkData = await checkRes.json();
                const articles = checkData.articles || checkData || [];
                const stillGenerating = (Array.isArray(articles) ? articles : []).some(a => a.status === 'regenerating');
                if (!stillGenerating) {
                    clearInterval(poll);
                    btn.disabled = false;
                    btn.innerHTML = '&#8635; Regenerate All Published';
                    showToast('Batch regeneration complete!');
                    articleListLoaded = false;
                    renderArticleListView();
                }
            } catch (e) { /* continue polling */ }
        }, 10000);
    } catch (e) {
        console.error('Batch regeneration failed:', e);
        showToast('Batch regeneration failed', 'error');
        btn.disabled = false;
        btn.innerHTML = '&#8635; Regenerate All Published';
    }
}

            }).join('');
            var currentVNum = _snapshots.length + 1;
            var isCurrentGolden = goldenVersion !== null && currentVNum === goldenVersion;
            var currentGoldenClass = isCurrentGolden ? ' golden' : '';
            var _currentPill = '<button class="version-pill active' + currentGoldenClass + '" data-version-idx="current" onclick="viewArticleVersion(\'' + articleId + '\', -1)">' + (t('version_current') || 'Current') + ' <span class="pill-meta">V' + currentVNum + '</span></button>';

                html = '';
            }
            if (html) {
                iframe.srcdoc = injectHighlightSupport(html);

                iframe.srcdoc = '<html><body style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui;color:#6b7280;"><div style="text-align:center"><p style="font-size:18px;margin-bottom:8px;">' + t('article_no_content') + '</p><p style="font-size:13px;">' + t('article_no_content_hint') + '</p></div></body></html>';
            }
        }

        // Collapse header/SERP/version bar on iframe scroll
        const modal = document.getElementById('article-modal-main');
        if (iframe) {
            iframe.addEventListener('load', () => {
                try {
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    let lastScrollTop = 0;
                    iframeDoc.addEventListener('scroll', () => {
                        const st = iframeDoc.documentElement.scrollTop || iframeDoc.body.scrollTop;
                        if (st > 80 && st > lastScrollTop) {
                            modal.classList.add('header-collapsed');
                        } else if (st < 40) {
                            modal.classList.remove('header-collapsed');
                        }
                        lastScrollTop = st;
                    });
                } catch(e) {}
            });
        }

        // Dismiss popover on clicks outside it
        const popoverDismissHandler = (e) => {
            if (_activePopover && !_activePopover.contains(e.target)) {
                dismissCommentPopover();
            }
        };
        document.addEventListener('mousedown', popoverDismissHandler);

            if (_articleDirty && !confirm(t('article_unsaved_changes'))) return;
            _saveFeedbackDraft(articleId);
            dismissCommentPopover();
            _resetArticleEditState();
            overlay.remove();
            document.body.style.overflow = '';
            document.removeEventListener('keydown', escHandler);
            document.removeEventListener('mousedown', popoverDismissHandler);
        }

        // Close button
        overlay.querySelector('.article-modal-close').onclick = closeModal;

        // Close on backdrop click
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeModal();
        });

        // Close on Escape
        const escHandler = (e) => {
            if (e.key === 'Escape') closeModal();
        };
        document.addEventListener('keydown', escHandler);
    } catch (err) {
        alert(t('article_not_found'));

/* ── IFRAME HIGHLIGHT INJECTION ── */
function injectHighlightSupport(html) {
    if (!html || html.includes('__highlight_injected__')) return html;
    const highlightStyle = `<style id="__highlight_injected__">
        .change-highlight { background: #bbf7d0; border-radius: 2px; padding: 0 1px; }
        .section-changed { border-left: 3px solid #22c55e; padding-left: 8px; transition: border-color .3s; }
        .section-new-badge {
            display: inline-block; background: #22c55e; color: #fff; font-size: 10px;
            font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-left: 8px;
            vertical-align: middle;
        }
        .clear-highlights-btn {
            position: fixed; top: 12px; right: 12px; z-index: 9999;
            background: #fff; border: 1px solid #d1d5db; border-radius: 999px;
            padding: 6px 14px; font-size: 12px; font-weight: 600; color: #374151;
            cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.1);
            display: none;
        }
        .clear-highlights-btn:hover { background: #f3f4f6; }
    </style>`;
    const highlightScript = '<script>' +
        '(function() {' +
        '    console.log("[highlight] script loaded in iframe");' +
        '    var clearBtn = document.createElement("button");' +
        '    clearBtn.className = "clear-highlights-btn";' +
        '    clearBtn.textContent = "' + t('clear_highlights').replace(/"/g, '\\"') + '";' +
        '    clearBtn.onclick = function() { clearAllHighlights(); };' +
        '    document.body.appendChild(clearBtn);' +
        '' +
        '    function showClearBtn() { clearBtn.style.display = "block"; }' +
        '' +

function computeChangedSections(oldHtml, newHtml) {
    const extractSections = (html) => {
        const tmp = document.createElement('div');
        tmp.innerHTML = html;
        const sections = {};
        const h2s = tmp.querySelectorAll('h2');
        h2s.forEach(h2 => {
            const heading = h2.textContent.trim();
            let text = '';
            let el = h2.nextElementSibling;
            while (el && el.tagName !== 'H2') {
                text += (el.textContent || '') + ' ';
                el = el.nextElementSibling;
            }
            sections[heading] = text.trim().substring(0, 500);
        });
        return sections;
    };
    const oldSections = extractSections(oldHtml);
    const newSections = extractSections(newHtml);
    const changed = [];
    for (const [heading, text] of Object.entries(newSections)) {
        if (!(heading in oldSections)) {
            changed.push({ heading, isNew: true, newLabel: t('new_section') });
        } else if (oldSections[heading] !== text) {
            changed.push({ heading, isNew: false });
        }
    }
    return changed;
}

/* ── DIFF UTILITIES ── */
function stripHtmlTags(html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    // Remove non-content elements (styles, scripts, JSON-LD, nav, footer, etc.)
    tmp.querySelectorAll('style, script, nav, footer, header, .breadcrumb, .category-badge, noscript').forEach(el => el.remove());
    // If the HTML is a full page, extract just the article/main/body content
    const article = tmp.querySelector('article') || tmp.querySelector('main') || tmp.querySelector('.article-content') || tmp.querySelector('body') || tmp;
    return (article.textContent || article.innerText || '').replace(/\s+/g, ' ').trim();
}

function computeWordDiff(oldText, newText) {
    const oldWords = oldText.split(/\s+/).filter(Boolean);
    const newWords = newText.split(/\s+/).filter(Boolean);
    const m = oldWords.length, n = newWords.length;

    // LCS table for backtracking
    const dp = [];
    for (let i = 0; i <= m; i++) {
        dp[i] = new Array(n + 1).fill(0);
    }
    for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
            if (oldWords[i - 1] === newWords[j - 1]) {
                dp[i][j] = dp[i - 1][j - 1] + 1;
            } else {
                dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
            }
        }
    }

    // Backtrack to build diff
    const result = [];
    let i = m, j = n;
    while (i > 0 || j > 0) {
        if (i > 0 && j > 0 && oldWords[i - 1] === newWords[j - 1]) {
            result.unshift({ type: 'equal', text: oldWords[i - 1] });
            i--; j--;
        } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
            result.unshift({ type: 'add', text: newWords[j - 1] });
            j--;
        } else {
            result.unshift({ type: 'remove', text: oldWords[i - 1] });
            i--;
        }
    }
    return result;
}

function renderDiffHtml(diffSegments, side) {
    // side: 'old' (show removes, hide adds), 'new' (show adds, hide removes), 'unified' (show both)
    return diffSegments.map(seg => {
        if (seg.type === 'equal') return esc(seg.text);
        if (seg.type === 'remove' && (side === 'old' || side === 'unified'))
            return '<span class="diff-word-remove">' + esc(seg.text) + '</span>';
        if (seg.type === 'add' && (side === 'new' || side === 'unified'))
            return '<span class="diff-word-add">' + esc(seg.text) + '</span>';
        return '';
    }).filter(Boolean).join(' ');
}

function showDiffOverlay(fb, currentHtml) {
    // Remove existing diff overlay
    const existing = document.getElementById('diff-overlay');
    if (existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.id = 'diff-overlay';
    overlay.className = 'diff-overlay';

    if (fb.type === 'inline_edit' && fb.changes && fb.changes.length > 0) {
        // Unified view for inline edits
        const editCards = fb.changes.map((ch, i) => {
            const oldText = stripHtmlTags(ch.original_snippet || '');
            const newText = stripHtmlTags(ch.revised_snippet || '');
            const diff = computeWordDiff(oldText, newText);
            const unifiedHtml = renderDiffHtml(diff, 'unified');
            return `<div class="diff-edit-card">
                <div class="diff-edit-card-header">Edit ${ch.edit_number || (i + 1)}</div>
                <div class="diff-edit-card-body">${unifiedHtml}</div>
            </div>`;
        }).join('');

        overlay.innerHTML = `
            <div class="diff-modal unified">
                <div class="diff-header">
                    <div>
                        <h3>${t('view_changes')}</h3>
                        <div class="diff-comment">${fb.edits_applied || fb.changes.length} ${t('edits_count')}</div>
                    </div>
                    <button class="diff-close-btn" onclick="document.getElementById('diff-overlay').remove()">&times;</button>
                </div>
                <div class="diff-unified-body">${editCards}</div>
            </div>`;
    } else if (fb.old_article_html) {
        // Side-by-side view for full regeneration
        const oldText = stripHtmlTags(fb.old_article_html);
        const newText = stripHtmlTags(currentHtml);
        const diff = computeWordDiff(oldText, newText);
        const oldHtml = renderDiffHtml(diff, 'old');
        const newHtml = renderDiffHtml(diff, 'new');

        overlay.innerHTML = `
            <div class="diff-modal side-by-side">
                <div class="diff-header">
                    <div>
                        <h3>${t('view_changes')}</h3>
                        <div class="diff-comment">${esc(fb.comment || '').substring(0, 200)}</div>
                    </div>
                    <button class="diff-close-btn" onclick="document.getElementById('diff-overlay').remove()">&times;</button>
                </div>
                <div class="diff-panels">
                    <div class="diff-panel" id="diff-panel-old">
                        <div class="diff-panel-label">${t('previous_version')}</div>
                        <div>${oldHtml}</div>
                    </div>
                    <div class="diff-panel" id="diff-panel-new">
                        <div class="diff-panel-label">${t('current_version')}</div>
                        <div>${newHtml}</div>
                    </div>
                </div>
            </div>`;
    }

    document.body.appendChild(overlay);

    // Close on backdrop click
    overlay.addEventListener('click', (e) => {
        if (e.target === overlay) overlay.remove();
    });

    // Scroll sync for side-by-side panels
    const oldPanel = document.getElementById('diff-panel-old');
    const newPanel = document.getElementById('diff-panel-new');
    if (oldPanel && newPanel) {
        let syncing = false;
        oldPanel.addEventListener('scroll', () => {
            if (syncing) return;
            syncing = true;
            newPanel.scrollTop = oldPanel.scrollTop;
            syncing = false;
        });
        newPanel.addEventListener('scroll', () => {
            if (syncing) return;
            syncing = true;
            oldPanel.scrollTop = newPanel.scrollTop;
            syncing = false;
        });
    }
}

function buildFeedbackCardHTML(fb, index) {
    // Skip snapshot and review_agent entries — they're not user-facing
    if (fb.type === 'snapshot' || fb.type === 'review_agent') return '';
    const date = fb.created_at ? new Date(fb.created_at).toLocaleString() : '';
    const version = fb.version || (index + 1);

    return `<div class="feedback-card">
        <div class="feedback-card-header">

}

function viewArticleVersion(articleId, versionIdx) {
    const overlay = document.getElementById('article-modal-overlay');
    if (!overlay) return;

    if (!iframe) return;
    const badge = document.getElementById('version-viewing-badge');
    const pills = overlay.querySelectorAll('.article-version-bar .version-pill');

    pills.forEach(p => p.classList.remove('active'));

    if (versionIdx === -1) {

        const currentPill = overlay.querySelector('[data-version-idx="current"]');
        if (currentPill) currentPill.classList.add('active');
    } else {
        const snap = _versionSnapshots[versionIdx];

        if (!snap.article_html) {
            const d = snap.created_at ? new Date(snap.created_at).toLocaleDateString() : '';
            iframe.srcdoc = '<html><body style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui;color:#6b7280;"><div style="text-align:center"><p style="font-size:18px;margin-bottom:8px;">' + (t('version_no_preview') || 'Preview not available') + '</p><p style="font-size:13px;">V' + (snap.version || versionIdx + 1) + ' — ' + d + '</p></div></body></html>';
        } else {

}

function computeQualityIndicators(articleJson) {
    const reports = (articleJson || {})._pipeline_reports;
    if (!reports) return null;
    const checks = [];
    var s4 = reports.stage4;
    if (s4 && !s4.error) {
        var total = s4.total_urls || 0, dead = s4.dead_urls || 0, valid = s4.valid_urls || total - dead;
        var status = (dead >= 3 || total < 2) ? 'fail' : dead >= 1 ? 'warn' : 'pass';
        checks.push({ name: 'Sources', status: status, detail: valid + '/' + total + ' valid' });
    }
    var pv = reports.product_validation;
    if (pv && !pv.error) {
        var unknown = pv.unknown_products || 0, claims = pv.claims_flagged || 0, replacements = pv.replacements_made || 0;
        var status = (unknown > 0 || claims > 0) ? 'fail' : replacements > 0 ? 'warn' : 'pass';
        checks.push({ name: 'Products', status: status, detail: unknown > 0 ? unknown + ' unknown' : replacements > 0 ? replacements + ' replaced' : 'All valid' });
    }
    var cv = reports.claim_validation;
    if (cv && !cv.error) {
        var removed = cv.claims_removed || 0;
        checks.push({ name: 'Category', status: removed > 0 ? 'fail' : 'pass', detail: removed > 0 ? removed + ' cross-category claims' : 'Clean' });
    }
    var cl = reports.cleanup;
    if (cl && !cl.error) {
        var sie = cl.sie_detected || false;
        checks.push({ name: 'Sie-Form', status: sie ? 'fail' : 'pass', detail: sie ? 'Sie detected' : 'Du-Form OK' });
    }
    var overall = checks.some(function(c) { return c.status === 'fail'; }) ? 'fail' : checks.some(function(c) { return c.status === 'warn'; }) ? 'warn' : 'pass';
    return { overall: overall, checks: checks };
}

function renderQualityBadge(quality) {
    if (!quality) return '<span style="font-size:11px;color:#9CA3AF;" title="No quality data">\u2014</span>';
    var icons = { pass: '&#10003;', warn: '&#9888;', fail: '&#10007;' };
    var colors = { pass: '#059669', warn: '#D97706', fail: '#DC2626' };
    var bgs = { pass: '#ECFDF5', warn: '#FFFBEB', fail: '#FEF2F2' };
    var tooltip = quality.checks.map(function(c) { return c.name + ': ' + c.detail; }).join('\n');
    return '<span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:' + bgs[quality.overall] + ';color:' + colors[quality.overall] + ';font-size:13px;cursor:help;" title="' + esc(tooltip) + '">' + icons[quality.overall] + '</span>';
}

/* ── INLINE COMMENTS SYSTEM ── */
let _inlineComments = [];
let _commentIdCounter = 0;
let _activePopover = null;

function setupIframeSelection(iframe) {
    iframe.addEventListener('load', () => {
        const iframeDoc = iframe.contentDocument;
        if (!iframeDoc) return;

        // Ensure not editable by default (prevents accidental edits without edit mode)
        if (iframeDoc.body) iframeDoc.body.contentEditable = 'false';

        // Make all links open in new tab on regular click (not just Ctrl+click)
        iframeDoc.addEventListener('click', (e) => {
            if (_articleEditMode) return; // in edit mode, don't intercept
            const link = e.target.closest('a[href]');
            if (link) {
                e.preventDefault();
                const href = link.getAttribute('href');
                if (href && href !== '#' && !href.startsWith('#')) {
                    window.open(href, '_blank', 'noopener,noreferrer');
                } else if (href && href.startsWith('#')) {
                    // Scroll to anchor within iframe
                    const target = iframeDoc.querySelector(href);
                    if (target) target.scrollIntoView({ behavior: 'smooth' });
                }
            }
        });

        // Inject highlight style + commentable zone indicators into iframe
        const style = iframeDoc.createElement('style');
        style.textContent = `
            .inline-highlight { background: #fef9c3; border-bottom: 2px solid #eab308; transition: background 0.2s; }
            .inline-highlight:hover { background: #fde68a; }
            article, .intro, .direct-answer, header, .sources, .comparison-table, .takeaways, .faq, .paa, .author-card { cursor: text; position: relative; }
            ::selection { background: #bae6fd; }
            .toc, .meta, .last-updated, .image-placeholder { position: relative; }
            .toc::selection, .meta::selection, .last-updated::selection, .image-placeholder::selection,
            .toc *::selection, .meta *::selection, .last-updated *::selection, .image-placeholder *::selection { background: transparent; }
        `;
        iframeDoc.head.appendChild(style);

        // Dismiss popover on mousedown (before new selection starts)
        iframeDoc.addEventListener('mousedown', () => { dismissCommentPopover(); });

        // Detect text selection on mouseup (only for editable content areas)
        iframeDoc.addEventListener('mouseup', () => {
            setTimeout(() => {
                const selection = iframeDoc.getSelection();
                if (!selection || selection.isCollapsed || !selection.toString().trim()) return;
                const selectedText = selection.toString().trim();
                if (selectedText.length < 3) return;
                const range = selection.getRangeAt(0);
                // Block selections inside non-commentable zones (nav/meta only)
                const node = range.commonAncestorContainer;
                const el = node.nodeType === 3 ? node.parentElement : node;
                if (el && el.closest('.toc, .meta, .last-updated, .image-placeholder')) return;
                const rect = range.getBoundingClientRect();
                const iframeRect = iframe.getBoundingClientRect();
                showCommentPopover(
                    { top: iframeRect.top + rect.bottom, left: iframeRect.left + rect.left, width: rect.width },
                    selectedText, range, iframeDoc
                );
            }, 10);
        });
    });
}

function showCommentPopover(pos, selectedText, range, iframeDoc) {
    dismissCommentPopover();
    const popover = document.createElement('div');
    popover.className = 'inline-comment-popover';
    const preview = selectedText.length > 100 ? selectedText.substring(0, 100) + '\u2026' : selectedText;
    popover.innerHTML = `
        <div class="selected-text-preview">\u201C${esc(preview)}\u201D</div>
        <textarea class="popover-textarea" placeholder="${t('comment_on_text')}" rows="2"></textarea>
        <div class="popover-actions">
            <button class="popover-btn cancel">${t('cancel_comment')}</button>
            <button class="popover-btn add">${t('add_comment')}</button>
        </div>
    `;

    // Position near the selection, clamped to modal bounds
    const gap = 8, popWidth = 280, popHeight = 160;
    const modal = document.querySelector('.article-modal');
    const modalRect = modal ? modal.getBoundingClientRect() : { top: 0, left: 0, bottom: window.innerHeight, right: window.innerWidth };
    let top = pos.top + gap;
    let left = pos.left;
    // Clamp vertically within modal
    if (top + popHeight > modalRect.bottom - 8) top = pos.top - popHeight - gap;
    if (top < modalRect.top + 8) top = modalRect.top + 8;
    // Clamp horizontally within modal
    if (left + popWidth > modalRect.right - 8) left = modalRect.right - popWidth - 8;
    if (left < modalRect.left + 8) left = modalRect.left + 8;
    popover.style.top = top + 'px';
    popover.style.left = left + 'px';

    const cancelBtn = popover.querySelector('.popover-btn.cancel');
    const addBtn = popover.querySelector('.popover-btn.add');
    const textarea = popover.querySelector('.popover-textarea');

    cancelBtn.addEventListener('click', () => { dismissCommentPopover(); });
    addBtn.addEventListener('click', () => {
        const comment = textarea.value.trim();
        if (!comment) { textarea.style.borderColor = '#ef4444'; textarea.focus(); return; }
        try {
            addInlineComment(selectedText, comment, range, iframeDoc);
        } catch (e) {
            // Ensure comment is saved even if highlighting fails entirely
            _inlineComments.push({ id: _commentIdCounter++, text: selectedText, comment, highlighted: false });
            renderInlineComments();
        }
        dismissCommentPopover();
        try { iframeDoc.getSelection().removeAllRanges(); } catch (_) {}
    });
    textarea.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) addBtn.click();
        if (e.key === 'Escape') dismissCommentPopover();
    });

    // Prevent clicks on popover from bubbling to overlay (which would close modal)

function addInlineComment(text, comment, range, iframeDoc) {
    const id = _commentIdCounter++;
    let highlighted = false;
    try {
        // surroundContents only works when the range is within a single element.
        // For cross-element selections (multiple paragraphs), walk the text nodes
        // inside the range and wrap each one individually.
        const startContainer = range.startContainer;
        const endContainer = range.endContainer;
        const sameParent = startContainer === endContainer ||
            (startContainer.parentElement === endContainer.parentElement);

        if (sameParent) {
            const mark = iframeDoc.createElement('mark');
            mark.className = 'inline-highlight';
            mark.dataset.commentId = id;
            range.surroundContents(mark);
            highlighted = true;
        } else {
            // Multi-element selection: walk all text nodes in the range
            const walker = iframeDoc.createTreeWalker(
                range.commonAncestorContainer,
                NodeFilter.SHOW_TEXT,
                null
            );
            const textNodes = [];
            let inRange = false;
            while (walker.nextNode()) {
                const node = walker.currentNode;
                if (node === range.startContainer) inRange = true;
                if (inRange && node.textContent.trim()) textNodes.push(node);
                if (node === range.endContainer) break;
            }
            for (const node of textNodes) {
                const mark = iframeDoc.createElement('mark');
                mark.className = 'inline-highlight';
                mark.dataset.commentId = id;
                const nodeRange = iframeDoc.createRange();
                if (node === range.startContainer) {
                    nodeRange.setStart(node, range.startOffset);
                    nodeRange.setEnd(node, node.textContent.length);
                } else if (node === range.endContainer) {
                    nodeRange.setStart(node, 0);
                    nodeRange.setEnd(node, range.endOffset);
                } else {
                    nodeRange.selectNodeContents(node);
                }
                try { nodeRange.surroundContents(mark); } catch (_) {}
            }
            highlighted = textNodes.length > 0;
        }
    } catch (e) {
        // Fallback: highlight failed, but comment still saved
    }
    _inlineComments.push({ id, text, comment, highlighted });
    renderInlineComments();
}

function removeInlineComment(id) {
    const overlay = document.getElementById('article-modal-overlay');
    if (overlay) {
        const iframe = overlay.querySelector('iframe');
        if (iframe && iframe.contentDocument) {
            // Remove all marks with this comment ID (multi-paragraph selections create multiple marks)
            const marks = iframe.contentDocument.querySelectorAll('mark[data-comment-id="' + id + '"]');
            marks.forEach(mark => {
                const parent = mark.parentNode;
                while (mark.firstChild) parent.insertBefore(mark.firstChild, mark);
                parent.removeChild(mark);
                parent.normalize();
            });
        }
    }
    _inlineComments = _inlineComments.filter(c => c.id !== id);
    renderInlineComments();
}

async function handleRegenerate(articleId, fromScratch) {
    const textarea = document.getElementById('feedback-textarea');
    const statusBar = document.getElementById('feedback-status-bar');
    const btnFeedback = document.getElementById('btn-regen-feedback');
    const btnScratch = document.getElementById('btn-regen-scratch');
    const generalFeedback = textarea ? textarea.value.trim() : '';

    // Require general feedback when not regenerating from scratch
    if (!fromScratch && !generalFeedback) {
        statusBar.className = 'feedback-status-bar error';
        statusBar.textContent = t('feedback_placeholder');
        setTimeout(() => { statusBar.className = 'feedback-status-bar'; statusBar.textContent = ''; }, 3000);
        return;
    }

    const combinedFeedback = generalFeedback || null;

    // Disable buttons, show loading
    if (btnFeedback) btnFeedback.disabled = true;
    if (btnScratch) btnScratch.disabled = true;
    statusBar.className = 'feedback-status-bar loading';
    statusBar.textContent = t('regenerating');

    try {
        const res = await fetch('/api/blog-article', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ article_id: articleId, feedback: combinedFeedback, from_scratch: fromScratch }),
        });
        const data = await res.json();

        if (!res.ok || data.error) {
            statusBar.className = 'feedback-status-bar error';
            statusBar.textContent = data.error || t('generation_failed');
            if (btnFeedback) btnFeedback.disabled = false;
            if (btnScratch) btnScratch.disabled = false;
            return;
        }

        if (data.status === 'regenerating' || data.status === 'completed') {
            // Start polling (10 min timeout: 120 polls × 5s)
            let polls = 0;
            const maxPolls = 120;
            const pollInterval = setInterval(async () => {
                polls++;
                if (polls > maxPolls) {
                    clearInterval(pollInterval);
                    statusBar.className = 'feedback-status-bar error';
                    statusBar.textContent = t('generation_failed');
                    if (btnFeedback) btnFeedback.disabled = false;
                    if (btnScratch) btnScratch.disabled = false;
                    return;
                }
                try {
                    const pollRes = await fetch(`/api/blog-article?id=${articleId}`);
                    const article = await pollRes.json();
                    if (article.generation_stage && article.status !== 'completed' && article.status !== 'failed') {
                        const stageKey = 'stage_' + article.generation_stage;
                        const label = t(stageKey) !== stageKey ? t(stageKey) : t('regenerating');
                        statusBar.textContent = label;
                    }
                    if (article.status === 'completed') {
                        clearInterval(pollInterval);
                        statusBar.className = 'feedback-status-bar success';
                        statusBar.textContent = t('regeneration_complete');
                        if (textarea) textarea.value = '';
                        if (btnFeedback) btnFeedback.disabled = false;
                        if (btnScratch) btnScratch.disabled = false;

                        // Update iframe
                        const overlay = document.getElementById('article-modal-overlay');
                        if (overlay) {
                            const iframe = overlay.querySelector('iframe');
                            if (iframe && article.article_html) iframe.srcdoc = injectHighlightSupport(article.article_html);
                            // Highlight changed sections
                            const lastFb = (article.feedback_history || []).slice(-1)[0];
                            if (lastFb && lastFb.old_article_html) {
                                iframe.addEventListener('load', function onLoad() {
                                    iframe.removeEventListener('load', onLoad);
                                    const changedHeadings = computeChangedSections(lastFb.old_article_html, article.article_html);
                                    sendHighlightMessage(iframe, { type: 'highlight-sections', changedHeadings });
                                });
                            }
                            _resetArticleEditState();

                            // Update header headline
                            const h2 = overlay.querySelector('.article-modal-header h2');
                            if (h2) h2.textContent = article.headline || article.keyword || '';

                            // Update word count in meta
                            const metaSpans = overlay.querySelectorAll('.article-modal-meta span');
                            if (metaSpans.length > 0 && article.word_count) {
                                metaSpans[0].textContent = article.word_count + ' ' + t('article_word_count');
                            }

                            // Update status badge
                            const statusBadge = overlay.querySelector('.article-modal-status');
                            if (statusBadge) {
                                statusBadge.className = 'article-modal-status completed';
                                statusBadge.textContent = t('status_completed');
                            }

                            // Refresh feedback history
                            const historyList = document.getElementById('feedback-history-list');
                            if (historyList) {
                                const history = article.feedback_history || [];
                                historyList.innerHTML = history.length === 0
                                    ? `<div class="feedback-empty">${t('no_feedback_yet')}</div>`
                                    : history.map((fb, i) => buildFeedbackCardHTML(fb, i)).join('');
                                historyList.scrollTop = historyList.scrollHeight;
                                _feedbackEntries = history;
                                _currentArticleHtml = article.article_html || '';
                            }

                            // Clear inline comments + draft (no longer valid for new content)
                            _inlineComments = [];
                            _commentIdCounter = 0;
                            renderInlineComments();
                            _feedbackDrafts.delete(articleId);
                        }

                        // Update generatedArticles map
                        const srcId = article.source_item_id;
                        if (srcId) {
                            generatedArticles.set(srcId, { articleId: article.id, status: 'completed' });
                        }

                        setTimeout(() => { statusBar.className = 'feedback-status-bar'; statusBar.textContent = ''; }, 8000);
                    } else if (article.status === 'failed') {
                        clearInterval(pollInterval);
                        statusBar.className = 'feedback-status-bar error';
                        statusBar.textContent = article.error_message || t('generation_failed');
                        if (btnFeedback) btnFeedback.disabled = false;
                        if (btnScratch) btnScratch.disabled = false;
                    }
                } catch (e) { /* continue polling */ }
            }, 5000);
        } else {
            throw new Error(data.error || 'Unknown error');
        }
    } catch (err) {
        statusBar.className = 'feedback-status-bar error';
        statusBar.textContent = err.message || t('generation_failed');
        if (btnFeedback) btnFeedback.disabled = false;
        if (btnScratch) btnScratch.disabled = false;
    }
}

async function handleApplyEdits(articleId) {
    if (_inlineComments.length === 0) return;

    const statusBar = document.getElementById('feedback-status-bar');
    const btnApply = document.getElementById('btn-apply-edits');
    const btnFeedback = document.getElementById('btn-regen-feedback');
    const btnScratch = document.getElementById('btn-regen-scratch');

    const edits = _inlineComments.map(ic => ({
        passage_text: ic.text,
        comment: ic.comment,
    }));

    // Disable all buttons
    if (btnApply) btnApply.disabled = true;
    if (btnFeedback) btnFeedback.disabled = true;
    if (btnScratch) btnScratch.disabled = true;
    statusBar.className = 'feedback-status-bar loading';
    statusBar.textContent = t('applying_edits');

    try {
        const res = await fetch('/api/blog-article', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ article_id: articleId, edits }),
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || data.detail || 'Unknown error');

        statusBar.className = 'feedback-status-bar success';
        statusBar.textContent = t('edits_applied') + ` (${data.edits_applied || 0})`;

        // Update iframe with new HTML
        const overlay = document.getElementById('article-modal-overlay');
        if (overlay && data.article_html) {
            const iframe = overlay.querySelector('iframe');
            if (iframe) iframe.srcdoc = injectHighlightSupport(data.article_html);
            // Highlight changes in iframe after load
            if (iframe && data.changes && data.changes.length > 0) {
                iframe.addEventListener('load', function onLoad() {
                    iframe.removeEventListener('load', onLoad);
                    sendHighlightMessage(iframe, { type: 'highlight-changes', changes: data.changes });
                });
            }
            _resetArticleEditState();
        }

        // Refresh feedback history
        const historyList = document.getElementById('feedback-history-list');
        if (historyList && data.feedback_history) {
            const history = data.feedback_history;
            historyList.innerHTML = history.length === 0
                ? `<div class="feedback-empty">${t('no_feedback_yet')}</div>`
                : history.map((fb, i) => buildFeedbackCardHTML(fb, i)).join('');
            historyList.scrollTop = historyList.scrollHeight;
            _feedbackEntries = data.feedback_history;
            _currentArticleHtml = data.article_html || '';
        }

        // Clear inline comments + draft
        _inlineComments = [];
        _commentIdCounter = 0;
        renderInlineComments();
        _feedbackDrafts.delete(articleId);

        setTimeout(() => { statusBar.className = 'feedback-status-bar'; statusBar.textContent = ''; }, 8000);
    } catch (err) {
        statusBar.className = 'feedback-status-bar error';
        statusBar.textContent = t('edits_failed') + ': ' + (err.message || '');
        setTimeout(() => { statusBar.className = 'feedback-status-bar'; statusBar.textContent = ''; }, 8000);
    } finally {
        if (btnApply) btnApply.disabled = false;
        if (btnFeedback) btnFeedback.disabled = false;
        if (btnScratch) btnScratch.disabled = false;
    }
}

            const history = data?.history || [];
            if (history.length < 2) {
                wrap.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--gray-400);font-size:13px;">${t('media_no_history')}</div>`;
                return;
            }
            wrap.innerHTML = `<canvas id="mediaTrendChart"></canvas>`;
            _initTrendChart(history);
        })
        .catch(() => {
            const wrap = document.getElementById('mediaTrendChartWrap');
            if (wrap) wrap.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--gray-400);font-size:13px;">${t('media_no_history')}</div>`;
        });
}

function renderMediaCompetitorTable() {
    const wrap = document.getElementById('mediaCompetitorTableWrap');
    if (!wrap) return;
    const data = mediaVisibilityData;
    if (!data) return;

    const overview = data.overview || {};
    const competitors = data.competitors || [];
    const beurer = { name: 'BILD Pauschalreisen', score: overview.score, change: overview.trend || null, rank: null, isBrand: true };
    const allBrands = [beurer, ...competitors].sort((a, b) => (b.score ?? 0) - (a.score ?? 0));

    const PAGE_SIZE = 8;
    let currentPage = 0;
    const totalPages = Math.ceil(allBrands.length / PAGE_SIZE);

    function render() {
        const start = currentPage * PAGE_SIZE;
        const page = allBrands.slice(start, start + PAGE_SIZE);
        const rangeEnd = Math.min(start + PAGE_SIZE, allBrands.length);

        const pagWrap = document.getElementById('mediaCompetitorPagination');
        if (pagWrap) {
            pagWrap.innerHTML = totalPages > 1 ? `
                <button class="filter-btn" style="padding:3px 8px;font-size:11px;" ${currentPage === 0 ? 'disabled style="opacity:0.3;padding:3px 8px;font-size:11px;"' : ''} onclick="document.getElementById('mediaCompetitorTableWrap').__prevPage()">&#8249;</button>
                <span>${start + 1}-${rangeEnd} of ${allBrands.length}</span>
                <button class="filter-btn" style="padding:3px 8px;font-size:11px;" ${currentPage >= totalPages - 1 ? 'disabled style="opacity:0.3;padding:3px 8px;font-size:11px;"' : ''} onclick="document.getElementById('mediaCompetitorTableWrap').__nextPage()">&#8250;</button>
            ` : '';
        }

        let html = `<table style="width:100%;border-collapse:collapse;font-size:13px;">
            <thead><tr style="border-bottom:1px solid var(--gray-100);">
                <th style="padding:10px 12px;text-align:left;font-weight:600;width:30px;color:var(--gray-400);font-size:11px;">#</th>
                <th style="padding:10px 12px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--gray-400);">${t('media_brand')}</th>
                <th style="padding:10px 12px;text-align:right;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--gray-400);">${t('media_visibility')}</th>
                <th style="padding:10px 12px;text-align:right;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--gray-400);">${t('media_change')}</th>
            </tr></thead><tbody>`;

        page.forEach((b, idx) => {
            const rank = start + idx + 1;
            const isBrand = b.isBrand || false;
            const rowBg = isBrand ? 'background:rgba(198,0,80,0.04);' : '';
            const leftBorder = isBrand ? 'border-left:3px solid #DD0000;' : 'border-left:3px solid transparent;';
            const badge = isBrand
                ? `<span style="font-size:10px;padding:1px 6px;border-radius:4px;background:#DD0000;color:white;margin-left:6px;font-weight:600;">You</span>`
                : '';

            const visBar = `<div style="display:inline-flex;align-items:center;gap:6px;">
                <div style="width:40px;height:6px;background:var(--gray-100);border-radius:3px;overflow:hidden;">
                    <div style="height:100%;width:${Math.min(100, b.score ?? 0)}%;background:${isBrand ? '#DD0000' : 'var(--gray-400)'};border-radius:3px;"></div>
                </div>
                <span style="font-weight:600;">${b.score}%</span>
            </div>`;

            const changeVal = b.change != null ? esc(String(b.change)) : '–';
            const changeColor = String(b.change || '').includes('+') ? 'var(--success)' : String(b.change || '').includes('-') ? 'var(--error)' : 'var(--gray-400)';

            html += `<tr style="border-bottom:1px solid var(--gray-50);${rowBg}${leftBorder}">
                <td style="padding:10px 12px;color:var(--gray-400);font-size:12px;">${rank}</td>
                <td style="padding:10px 12px;font-weight:${isBrand ? '700' : '500'};">${esc(b.name)}${badge}</td>
                <td style="padding:10px 12px;text-align:right;">${visBar}</td>
                <td style="padding:10px 12px;text-align:right;font-size:12px;color:${changeColor};">${changeVal}</td>
            </tr>`;
        });

        html += `</tbody></table>`;
        wrap.innerHTML = html;
    }

    wrap.__prevPage = () => { currentPage = Math.max(0, currentPage - 1); render(); };
    wrap.__nextPage = () => { if (currentPage < totalPages - 1) { currentPage++; render(); } };
    render();
}

function _initTrendChart(history) {
    if (typeof Chart === 'undefined' || !history?.length) return;
    _destroyChartById('mediaTrendChart');

    const el = document.getElementById('mediaTrendChart');
    if (!el) return;

    const labels = history.map(h => formatDate(h.snapshot_date));

    // Build datasets: Beurer + competitors from the latest snapshot's competitor list
    const beurerData = history.map(h => h.brand_score);
    const datasets = [{
        label: 'BILD Pauschalreisen',
        data: beurerData,
        borderColor: '#DD0000',
        backgroundColor: '#DD000015',
        borderWidth: 2.5,
        pointRadius: 3,
        pointHoverRadius: 5,
        tension: 0.3,
        fill: false,
    }];

    // Extract unique competitor names from the most recent snapshot
    const latestCompetitors = history[history.length - 1]?.competitors || [];
    const compColors = ['#4A90D9', '#34C759', '#FF9500', '#8E24AA', '#FF3B30', '#5AC8FA'];

    latestCompetitors.forEach((comp, idx) => {
        const name = comp.name || `Competitor ${idx + 1}`;
        const color = compColors[idx % compColors.length];

        // For each date, find this competitor's score
        const compData = history.map(h => {
            const c = (h.competitors || []).find(c => c.name === name);
            return c?.score ?? null;
        });

        datasets.push({
            label: name,
            data: compData,
            borderColor: color,
            backgroundColor: color + '15',
            borderWidth: 1.5,
            pointRadius: 2,
            pointHoverRadius: 4,
            tension: 0.3,
            fill: false,
        });
    });

    new Chart(el, {
        type: 'line',
        data: { labels, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: {
                    position: 'right',
                    labels: { usePointStyle: true, pointStyle: 'circle', padding: 12, font: { size: 11 } },
                },
                tooltip: { mode: 'index', intersect: false },
            },
            scales: {
                x: { grid: { display: false }, ticks: { font: { size: 11 }, maxRotation: 45 } },
                y: { min: 0, max: 100, grid: { color: 'var(--gray-100)' }, ticks: { font: { size: 11 } } },
            },
        },
    });
}

// ── Recent Chats (prompt cards) ──
const MEDIA_MODEL_DISPLAY = {
    'gpt-4o-mini': 'ChatGPT', 'gpt-4o': 'ChatGPT', 'gpt-4': 'ChatGPT',
    'google-aio': 'AI Overview', 'google-ai-mode': 'AI Mode',
    'gemini-2.5-flash': 'Gemini', 'gemini-2.0-flash': 'Gemini', 'gemini-pro': 'Gemini',
    'sonar': 'Perplexity', 'claude-3': 'Claude', 'claude-3.5-sonnet': 'Claude',
    'copilot': 'Copilot',
};
function mediaDisplayModel(m) { return MEDIA_MODEL_DISPLAY[m] || m; }

function renderMediaChats() {
    const wrap = document.getElementById('mediaChatsWrap');
    if (!wrap) return;
    const data = mediaVisibilityData;
    if (!data) return;

    const allPrompts = data.prompts || [];
    if (!allPrompts.length) return;

    const modelFilter = wrap.dataset.modelFilter || 'all';
    const brandFilter = document.getElementById('mediaChatBrandFilter')?.checked || false;

    // Apply filters
    let prompts = allPrompts;
    if (modelFilter !== 'all') {
        prompts = prompts.filter(p => (p.aiModels || []).includes(modelFilter));
    }
    if (brandFilter) {
        prompts = prompts.filter(p => p.mentions > 0);
    }

    // Render model filter buttons
    const filterWrap = document.getElementById('mediaChatModelFilter');
    if (filterWrap) {
        const allModels = new Set();
        allPrompts.forEach(p => (p.aiModels || []).forEach(m => allModels.add(m)));
        const modelList = [...allModels].sort();
        filterWrap.innerHTML = `
            <button class="filter-btn${modelFilter === 'all' ? ' active' : ''}" style="padding:4px 10px;font-size:11px;" onclick="document.getElementById('mediaChatsWrap').dataset.modelFilter='all';document.getElementById('mediaChatsWrap').dataset.page=0;renderMediaChats()">${t('media_filter_all')}</button>
            ${modelList.map(m => `<button class="filter-btn${modelFilter === m ? ' active' : ''}" style="padding:4px 10px;font-size:11px;" onclick="document.getElementById('mediaChatsWrap').dataset.modelFilter='${esc(m)}';document.getElementById('mediaChatsWrap').dataset.page=0;renderMediaChats()">${aiModelDot(mediaDisplayModel(m))} ${esc(mediaDisplayModel(m))}</button>`).join('')}
        `;
    }

    // Update count
    const countEl = document.getElementById('mediaChatCount');
    if (countEl) countEl.textContent = `(${prompts.length})`;

    const PAGE_SIZE = 10;
    let currentPage = parseInt(wrap.dataset.page || '0', 10);
    const totalPages = Math.max(1, Math.ceil(prompts.length / PAGE_SIZE));
    if (currentPage >= totalPages) currentPage = 0;
    const start = currentPage * PAGE_SIZE;
    const page = prompts.slice(start, start + PAGE_SIZE);
    const rangeEnd = Math.min(start + PAGE_SIZE, prompts.length);

    // Pagination
    const pagWrap = document.getElementById('mediaChatPagination');
    if (pagWrap) {
        pagWrap.innerHTML = totalPages > 1 ? `
            <button class="filter-btn" style="padding:3px 8px;font-size:11px;" ${currentPage === 0 ? 'disabled style="opacity:0.3;padding:3px 8px;font-size:11px;"' : ''} onclick="document.getElementById('mediaChatsWrap').dataset.page=${currentPage - 1};renderMediaChats()">&#8249;</button>
            <span>${start + 1}-${rangeEnd} of ${prompts.length}</span>
            <button class="filter-btn" style="padding:3px 8px;font-size:11px;" ${currentPage >= totalPages - 1 ? 'disabled style="opacity:0.3;padding:3px 8px;font-size:11px;"' : ''} onclick="document.getElementById('mediaChatsWrap').dataset.page=${currentPage + 1};renderMediaChats()">&#8250;</button>
        ` : '';
    }

    if (!prompts.length) {
        wrap.innerHTML = `<div style="text-align:center;padding:32px;color:var(--gray-400);font-size:13px;">No matching chats found.</div>`;
        return;
    }

    // Render 2-column grid of chat cards
    let html = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">`;
    page.forEach((p, idx) => {
        const models = (p.aiModels || []);
        const primaryModel = mediaDisplayModel(models[0] || '');
        const mentionBadge = p.mentions > 0
            ? `<span style="font-size:11px;padding:1px 8px;border-radius:4px;background:#34C75920;color:#34C759;font-weight:600;">${t('media_mentioned')} (${p.mentions})</span>`
            : '';
        const promptIdx = allPrompts.indexOf(p);
        const clickAttr = p.promptId ? `onclick="openMediaChatDetail(${promptIdx})" style="cursor:pointer;border:1px solid var(--gray-100);border-radius:10px;padding:14px 16px;background:var(--pure-white);transition:box-shadow 0.15s;"` : `style="border:1px solid var(--gray-100);border-radius:10px;padding:14px 16px;background:var(--pure-white);transition:box-shadow 0.15s;"`;

        html += `<div ${clickAttr} onmouseenter="this.style.boxShadow='var(--shadow-md)'" onmouseleave="this.style.boxShadow='none'">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
                ${aiModelDot(primaryModel)}
                <span style="font-size:12px;font-weight:600;color:var(--gray-700);">${esc(primaryModel)}</span>
                ${mentionBadge ? `<span style="margin-left:auto;">${mentionBadge}</span>` : ''}
            </div>
            <div style="font-size:13px;font-weight:600;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${esc(p.text)}</div>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                ${models.slice(0, 4).map(m => `<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--gray-400);">${aiModelDot(mediaDisplayModel(m))}${esc(mediaDisplayModel(m))}</span>`).join('')}
                ${models.length > 4 ? `<span style="font-size:10px;color:var(--gray-400);">+${models.length - 4}</span>` : ''}
            </div>
        </div>`;
    });
    html += `</div>`;

    wrap.innerHTML = html;
}

// ── Chat Detail Modal ──
let mediaChatDetailCache = {};

function openMediaChatDetail(promptIdx) {
    const data = mediaVisibilityData;
    if (!data) return;
    const prompt = (data.prompts || [])[promptIdx];
    if (!prompt) return;

    // Show loading modal immediately
    _showMediaChatModal(prompt, null, true);

    // Fetch detail if we have a promptId
    if (prompt.promptId) {
        const cached = mediaChatDetailCache[prompt.promptId];
        if (cached) {
            _showMediaChatModal(prompt, cached, false);
            return;
        }
        fetch('/api/media-visibility/prompt/' + encodeURIComponent(prompt.promptId))
            .then(r => r.ok ? r.json() : null)
            .then(detail => {
                if (detail && !detail.error) {
                    mediaChatDetailCache[prompt.promptId] = detail;
                    _showMediaChatModal(prompt, detail, false);
                } else {
                    _showMediaChatModal(prompt, null, false);
                }
            })
            .catch(() => _showMediaChatModal(prompt, null, false));
    }
}

let _mediaChatActiveModel = '';

function _showMediaChatModal(prompt, detail, loading) {
    let existing = document.getElementById('mediaChatDetailModal');
    if (!existing) {
        existing = document.createElement('div');
        existing.id = 'mediaChatDetailModal';
        document.body.appendChild(existing);
    }

    const runs = detail?.runs || [];

    if (loading) {
        existing.innerHTML = `
            <div style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;" onclick="if(event.target===this)closeMediaChatDetail()">
                <div style="background:var(--pure-white);border-radius:16px;max-width:900px;width:100%;max-height:85vh;display:flex;flex-direction:column;box-shadow:var(--shadow-xl);padding:60px;text-align:center;">
                    <div class="loading-spinner" style="margin:0 auto 12px;"></div>
                    <p style="color:var(--gray-400);font-size:13px;">Loading chat data...</p>
                </div>
            </div>`;
        existing.style.display = 'block';
        document.body.style.overflow = 'hidden';
        return;
    }

    // Deduplicate runs by display model name — pick latest run per model
    const modelRunMap = {};
    runs.forEach(run => {
        const m = mediaDisplayModel(run.aiModel || '');
        if (!modelRunMap[m] || run.mentioned) modelRunMap[m] = run;
    });
    const uniqueModels = Object.keys(modelRunMap);

    // Pick active model
    if (!_mediaChatActiveModel || !modelRunMap[_mediaChatActiveModel]) {
        _mediaChatActiveModel = uniqueModels.find(m => modelRunMap[m].mentioned) || uniqueModels[0] || '';
    }
    const r = modelRunMap[_mediaChatActiveModel] || runs[0] || {};
    const model = mediaDisplayModel(r.aiModel || '');
    const color = AI_MODEL_COLORS[model] || '#8E8E93';

    // Sentiment badge for header
    const sentimentLabel = r.sentiment ? r.sentiment.charAt(0).toUpperCase() + r.sentiment.slice(1) : '';
    const sentimentColor = r.sentiment === 'positive' ? '#34C759' : r.sentiment === 'negative' ? '#FF3B30' : '#FF9500';
    const sentimentBadge = sentimentLabel ? `<span style="font-size:12px;padding:3px 12px;border-radius:6px;background:${sentimentColor}18;color:${sentimentColor};font-weight:600;">${sentimentLabel}</span>` : '';

    // ── Model selector tabs (deduplicated) ──
    const modelTabs = uniqueModels.length > 1 ? `<div style="display:flex;gap:4px;padding:12px 24px;border-bottom:1px solid var(--gray-100);overflow-x:auto;">
        ${uniqueModels.map(m => {
            const run = modelRunMap[m];
            const mColor = AI_MODEL_COLORS[m] || '#8E8E93';
            const isActive = m === _mediaChatActiveModel;
            return `<button onclick="_mediaChatActiveModel='${esc(m)}';_showMediaChatModal(_mediaChatModalPrompt,_mediaChatModalDetail,false)" style="display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;border:1px solid ${isActive ? mColor : 'var(--gray-200)'};background:${isActive ? mColor + '12' : 'var(--pure-white)'};font-size:12px;font-weight:${isActive ? '600' : '400'};cursor:pointer;color:${isActive ? mColor : 'var(--gray-500)'};white-space:nowrap;">${aiModelDot(m)}${esc(m)}${run.mentioned ? ' ✓' : ''}</button>`;
        }).join('')}
    </div>` : '';

    // ── Helper: brand badge ──
    function _brandBadge(name, type) {
        const isBrand = name === 'BILD Pauschalreisen' || name === 'Beurer' || type === 'brand';
        const badgeColor = isBrand ? '#DD0000' : 'var(--gray-500)';
        const initial = esc(name.charAt(0).toLowerCase());
        const iconStyle = isBrand
            ? 'background:#DD0000;color:white;'
            : 'background:var(--gray-200);color:var(--gray-600);';
        const icon = `<span style="width:14px;height:14px;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;${iconStyle}">${initial}</span>`;
        return `<span style="display:inline-flex;align-items:center;gap:3px;padding:1px 8px;border-radius:4px;border:1.5px solid ${badgeColor};font-size:11px;font-weight:600;color:${badgeColor};vertical-align:middle;">${icon} ${esc(name)}</span>`;
    }

    // ── Main chat content (left) ──
    let answerHtml = '';
    if (r.brandMentions?.length) {
        answerHtml = r.brandMentions.map((b, idx) => {
            const badge = _brandBadge(b.name, b.type);
            const summaryText = b.summary || '';
            return `<div style="margin-bottom:16px;">
                <div style="font-size:14px;font-weight:600;margin-bottom:6px;">${idx + 1}. &nbsp;${badge} &nbsp;${esc(summaryText.split('.')[0] || b.name)}</div>
                ${summaryText ? `<div style="font-size:13px;color:var(--gray-600);line-height:1.6;padding-left:24px;">${esc(summaryText)}</div>` : ''}
            </div>`;
        }).join('');
    } else if (r.responseSnippet) {
        answerHtml = `<div style="font-size:13px;color:var(--gray-600);line-height:1.6;">${esc(r.responseSnippet)}</div>`;
    } else if (r.mentionSummary) {
        answerHtml = `<div style="font-size:13px;color:var(--gray-600);line-height:1.6;">${esc(r.mentionSummary)}</div>`;
    } else {
        answerHtml = `<div style="font-size:13px;color:var(--gray-400);font-style:italic;">No response data available for this run.</div>`;
    }

    // ── Sidebar: Brands + Sources ──
    let brandsSidebar = '';
    if (r.brandMentions?.length) {
        brandsSidebar = `<div style="margin-bottom:20px;">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">
                <span style="font-size:13px;">&#128278;</span>
                <span style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--gray-500);">BRANDS (${r.brandMentions.length})</span>
            </div>
            ${r.brandMentions.map(b => {
                const isBrand = b.name === 'BILD Pauschalreisen' || b.name === 'Beurer' || b.type === 'brand';
                const sentColor = b.sentiment === 'positive' ? '#34C759' : b.sentiment === 'negative' ? '#FF3B30' : '#FF9500';
                const sentLabel = b.sentiment ? b.sentiment.charAt(0).toUpperCase() + b.sentiment.slice(1) : '';
                const initial = esc(b.name.charAt(0).toLowerCase());
                const iconStyle = isBrand ? 'background:#DD0000;color:white;' : 'background:var(--gray-100);color:var(--gray-500);';
                return `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--gray-100);">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <span style="width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;${iconStyle}">${initial}</span>
                        <span style="font-size:13px;font-weight:${isBrand ? '700' : '500'};">${esc(b.name)}</span>
                    </div>
                    ${sentLabel ? `<span style="font-size:11px;padding:2px 10px;border-radius:4px;background:${sentColor}15;color:${sentColor};font-weight:600;">${sentLabel}</span>` : ''}
                </div>`;
            }).join('')}
        </div>`;
    }

    let sourcesSidebar = '';
    if (r.sources?.length) {
        sourcesSidebar = `<div>
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">
                <span style="font-size:13px;">&#128196;</span>
                <span style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--gray-500);">SOURCES (${r.sources.length})</span>
            </div>
            ${r.sources.map((s, idx) => {
                const title = s.title || s.domain;
                const truncTitle = title.length > 28 ? title.substring(0, 28) + '...' : title;
                return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--gray-100);">
                    <span style="font-size:11px;color:var(--gray-400);min-width:16px;text-align:right;">${idx + 1}</span>
                    <img src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(s.domain)}&sz=16" width="16" height="16" style="border-radius:2px;flex-shrink:0;" onerror="this.style.display='none'">
                    <a href="${esc(s.url || '#')}" target="_blank" rel="noopener" style="font-size:12px;color:var(--gray-700);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;" title="${esc(title)}">${esc(truncTitle)}</a>
                    <a href="${esc(s.url || '#')}" target="_blank" rel="noopener" style="color:var(--gray-400);flex-shrink:0;text-decoration:none;font-size:13px;">&#8599;</a>
                </div>`;
            }).join('')}
        </div>`;
    }

    // Store refs for model tab switching
    window._mediaChatModalPrompt = prompt;
    window._mediaChatModalDetail = detail;

    existing.innerHTML = `
        <div style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;" onclick="if(event.target===this)closeMediaChatDetail()">
            <div style="background:var(--pure-white);border-radius:16px;max-width:900px;width:100%;max-height:85vh;display:flex;flex-direction:column;box-shadow:var(--shadow-xl);">
                <!-- Header -->
                <div style="padding:16px 24px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;gap:12px;">
                    <div style="display:flex;align-items:center;gap:10px;">

function renderMediaSourceTable() {
    const wrap = document.getElementById('mediaSourceTableWrap');
    if (!wrap) return;
    const sources = (mediaVisibilityData?.sources || []).sort((a, b) => (b.mentions || 0) - (a.mentions || 0));
    if (!sources.length) return;

    const totalCitations = sources.reduce((sum, s) => sum + (s.mentions || 0), 0);
    const PAGE_SIZE = 6;
    let currentPage = 0;
    const totalPages = Math.ceil(sources.length / PAGE_SIZE);

    // Map AI model IDs to display names (same as renderMediaChats)
    const MODEL_DISPLAY = {
        'gpt-4o-mini': 'ChatGPT', 'gpt-4o': 'ChatGPT', 'gpt-4': 'ChatGPT',
        'google-aio': 'AI Overview', 'google-ai-mode': 'AI Mode',
        'gemini-2.5-flash': 'Gemini', 'gemini-2.0-flash': 'Gemini', 'gemini-pro': 'Gemini',
        'sonar': 'Perplexity', 'claude-3': 'Claude', 'claude-3.5-sonnet': 'Claude',
        'copilot': 'Copilot',
    };
    function displayModel(m) { return MODEL_DISPLAY[m] || m; }

    function render() {
        const start = currentPage * PAGE_SIZE;
        const page = sources.slice(start, start + PAGE_SIZE);
        const rangeEnd = Math.min(start + PAGE_SIZE, sources.length);

        const pagWrap = document.getElementById('mediaDomainPagination');
        if (pagWrap) {
            pagWrap.innerHTML = totalPages > 1 ? `
                <button class="filter-btn" style="padding:3px 8px;font-size:11px;" ${currentPage === 0 ? 'disabled style="opacity:0.3;padding:3px 8px;font-size:11px;"' : ''} onclick="document.getElementById('mediaSourceTableWrap').__prevPage()">&#8249;</button>
                <span>${start + 1}-${rangeEnd} of ${sources.length}</span>
                <button class="filter-btn" style="padding:3px 8px;font-size:11px;" ${currentPage >= totalPages - 1 ? 'disabled style="opacity:0.3;padding:3px 8px;font-size:11px;"' : ''} onclick="document.getElementById('mediaSourceTableWrap').__nextPage()">&#8250;</button>
            ` : '';
        }

        let html = `<table style="width:100%;border-collapse:collapse;font-size:13px;">
            <thead><tr style="border-bottom:1px solid var(--gray-100);">
                <th style="padding:10px 16px;text-align:left;font-weight:600;font-size:11px;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.5px;">${t('media_domain_col')}</th>
                <th style="padding:10px 12px;text-align:right;font-weight:600;font-size:11px;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.5px;">${t('media_used')}</th>
                <th style="padding:10px 12px;text-align:right;font-weight:600;font-size:11px;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.5px;">${t('media_cites')}</th>
            </tr></thead><tbody>`;

        page.forEach(s => {
            const usedPct = totalCitations > 0 ? ((s.mentions / totalCitations) * 100).toFixed(1) + '%' : '–';

            html += `<tr style="border-bottom:1px solid var(--gray-50);">
                <td style="padding:10px 16px;">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <img src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(s.domain)}&sz=16" width="16" height="16" style="border-radius:2px;flex-shrink:0;" onerror="this.style.display='none'">
                        <span style="font-weight:500;">${esc(s.domain)}</span>
                    </div>
                </td>
                <td style="padding:10px 12px;text-align:right;">${usedPct}</td>
                <td style="padding:10px 12px;text-align:right;font-weight:600;">${s.mentions}</td>
            </tr>`;
        });

        html += `</tbody></table>`;
        wrap.innerHTML = html;
    }

    wrap.__prevPage = () => { currentPage = Math.max(0, currentPage - 1); render(); };
    wrap.__nextPage = () => { if (currentPage < totalPages - 1) { currentPage++; render(); } };
    render();
}

function exportContentCSV() {
    const opps = contentPlanningData ? contentPlanningData.opportunities : [];
    if (opps.length === 0) return;
    const csvEsc = v => { const s = String(v || '').replace(/"/g, '""'); return s.includes(',') || s.includes('"') || s.includes('\n') ? '"' + s + '"' : s; };
    const header = [t('csv_priority'),t('csv_topic'),t('csv_category'),t('csv_gap_score'),t('csv_intent'),t('csv_keywords'),t('csv_source_url'),t('csv_discovered_week')];
    const rows = opps.map(o => {
        const gs = o.gap_score || 0;
        const prio = gs >= 7 ? t('priority_high') : gs >= 4 ? t('priority_medium_label') : t('priority_low');
        return [prio, o.topic || '', o.category || '', gs, o.intent || '', (o.keywords || []).join('; '), o.url || '', o.discovered_week || ''].map(csvEsc).join(',');
    });
    const csv = '\uFEFF' + header.join(',') + '\n' + rows.join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const dateStr = new Date().toISOString().split('T')[0];
    a.href = url; a.download = 'content-opportunities-' + dateStr + '.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

    })

function injectArticleNav(articleId) {
  const modal = document.getElementById('article-modal-main');
  if (!modal) return;
  // Don't inject twice
  if (modal.querySelector('.article-modal-nav')) return;

  const articles = window._articleNavList;
  if (articles.length <= 1) return;

  const currentIdx = articles.findIndex(a => a.articleId === articleId);
  const isFirst = currentIdx <= 0;
  const isLast = currentIdx >= articles.length - 1;

  const nav = document.createElement('div');
  nav.className = 'article-modal-nav';
  nav.innerHTML = `
    <span class="nav-label">Article</span>
    <button onclick="navigateArticle(-1)"${isFirst ? ' disabled' : ''}>&larr; Prev</button>
    <select onchange="jumpToArticle(this)">
      ${articles.map(a => '<option value="' + a.articleId + '"' + (a.articleId === articleId ? ' selected' : '') + '>' + esc((a.keyword || 'Untitled').substring(0, 50)) + '</option>').join('')}
    </select>
    <button onclick="navigateArticle(1)"${isLast ? ' disabled' : ''}>Next &rarr;</button>
  `;

  modal.insertBefore(nav, modal.firstChild);
}

function navigateArticle(direction) {
  const articles = window._articleNavList;
  if (!articles.length) return;

  const currentIdx = articles.findIndex(a => a.articleId === window._selectedArticleId);
  let newIdx = currentIdx + direction;
  if (newIdx < 0) newIdx = 0;
  if (newIdx >= articles.length) newIdx = articles.length - 1;
  if (newIdx !== currentIdx) {
    openSidePanel(articles[newIdx].articleId);
  }
}

function jumpToArticle(selectEl) {
  const articleId = selectEl.value;
  if (articleId) openSidePanel(articleId);
}

// Extract Beurer SKUs (BM/BC/EM/IL + 2-3 digits) from anywhere in the article JSON.
// Returns a sorted, de-duplicated list like ["BM 27", "EM 59"].
function extractBeurerSkusFromArticle(articleJson) {
  if (!articleJson || typeof articleJson !== 'object') return [];
  let blob;
  try { blob = JSON.stringify(articleJson); } catch (_) { return []; }
  const skus = new Set();
  const re = /\b(BM|BC|EM|IL)\s?(\d{2,3})\b/g;
  let m;
  while ((m = re.exec(blob)) !== null) skus.add(m[1] + ' ' + m[2]);
  return Array.from(skus).sort();
}

// Derive an article category from its keyword/topic when the stored category is missing.
// Mirrors blog/product_catalog.py _CATEGORY_KEYWORDS priority: menstrual > pain_tens > blood_pressure.
function deriveCategoryFromKeyword(keyword) {
  const k = (keyword || '').toLowerCase();
  if (!k) return 'other';
  const MENSTRUAL = ['menstrual', 'regel', 'periode', 'menstruation', 'periodenschmerz'];
  const PAIN = [
    'tens', 'ems', 'reizstrom', 'elektroden', 'schmerztherapie', 'muskelstimulation',
    'infrarot', 'rotlicht', 'wärmelampe', 'waermelampe', 'infrared',
    'rückenschmerz', 'rueckenschmerz', 'nackenschmerz', 'gelenkschmerz', 'muskelschmerz'
  ];
  const BP = [
    'blutdruck', 'blutdruckmess', 'oberarm', 'handgelenk', 'hypertonie', 'blood pressure',
    'ekg', 'smartwatch', 'fitnessband', 'fitnesstracker', 'fitness-tracker'
  ];
  if (MENSTRUAL.some(t => k.includes(t))) return 'menstrual';
  if (PAIN.some(t => k.includes(t))) return 'pain_tens';
  if (BP.some(t => k.includes(t))) return 'blood_pressure';
  return 'other';
}
