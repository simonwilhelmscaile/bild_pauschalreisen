<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BILD Pauschalreisen · Content Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20viewBox%3D%220%200%20200%20200%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Cpath%20d%3D%22M154.53%2C171.45c14.81-16.94%2C19.56-42.18%2C13.47-65.07-7.75-25.6-30.5-46.43-57.22-49.23-17.96-1.62-34.92%2C1.95-47.97%2C12.51V7.1h-31.98v114.29c.14%2C14.77%2C2.31%2C26.32%2C8.42%2C37.55%2C12.88%2C24.38%2C38.79%2C38.25%2C67.32%2C36.7%2C18.48-1.62%2C35.76-10.39%2C47.96-24.19M132.65%2C148.92c-9.17%2C11.99-24.6%2C18.31-40.39%2C15.02-14.54-3.76-26.35-16.58-28.61-31.7-2.63-15.8%2C4.7-30.71%2C17.67-39.22%2C11.38-7.5%2C29.67-7.32%2C41.24.83%2C5.54%2C3.76%2C10.29%2C9.22%2C13.46%2C15.86%2C5.79%2C11.55%2C4.48%2C28.46-3.36%2C39.2%22%20fill%3D%22%23c71553%22%2F%3E%3C%2Fsvg%3E">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --beurer-magenta: #DD0000;
            --beurer-magenta: #DD0000;
            --beurer-magenta-light: rgba(221, 0, 0, 0.08);
            --beurer-magenta-dark: #B00000;
            --beurer-magenta-bright: #FF0F0F;
            --beurer-magenta-glow: #FF3030;
            --beurer-magenta-subtle: rgba(221, 0, 0, 0.04);
            --accent-gold: #D4A574;
            --accent-gold-light: rgba(212, 165, 116, 0.15);
            --accent-gold-dark: #B8956A;
            --gray-50: #FAFAFA;
            --gray-100: #F5F5F7;
            --gray-200: #E8E8ED;
            --gray-300: #D2D2D7;
            --gray-400: #86868B;
            --gray-500: #6E6E73;
            --gray-600: #515154;
            --gray-700: #3A3A3C;
            --gray-800: #2C2C2E;
            --gray-900: #1D1D1F;
            --pure-white: #FFFFFF;
            --pure-black: #000000;
            --success: #34C759;
            --success-light: rgba(52, 199, 89, 0.1);
            --warning: #FF9500;
            --warning-light: rgba(255, 149, 0, 0.1);
            --error: #FF3B30;
            --error-light: rgba(255, 59, 48, 0.1);
            --info: #007AFF;
            --info-light: rgba(0, 122, 255, 0.1);
            --gradient-magenta: linear-gradient(135deg, var(--beurer-magenta) 0%, var(--beurer-magenta-dark) 100%);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.03);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --font-display: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-text: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'SF Mono', 'Monaco', 'Consolas', monospace;
            --ease-out: cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --sidebar-width-expanded: 240px;
            --sidebar-width-collapsed: 64px;
            --sidebar-transition: 0.22s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --sidebar-bg: #FFFFFF;
            --sidebar-border: var(--gray-200);
            --content-header-height: 60px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 14px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body { font-family: var(--font-text); background: #F7F7F8; color: var(--gray-900); line-height: 1.6; display: flex; min-height: 100vh; }

        /* ── SIDEBAR ── */
        .sidebar {
            position: fixed; top: 0; left: 0; bottom: 0;
            width: var(--sidebar-width-expanded);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--sidebar-border);
            display: flex; flex-direction: column;
            z-index: 120;
            transition: width var(--sidebar-transition);
            overflow: hidden;
        }
        .sidebar.collapsed { width: var(--sidebar-width-collapsed); }

        .sidebar-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 16px 12px;
            border-bottom: 1px solid var(--gray-100);
            flex-shrink: 0;
        }
        .sidebar-logo-area { display: flex; align-items: center; gap: 10px; overflow: hidden; min-width: 0; }
        .sidebar-logo {
            width: 32px; height: 32px; border-radius: 8px;
            background: var(--gradient-magenta);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 16px;
            overflow: hidden; flex-shrink: 0;
        }
        .sidebar-logo.has-img {
            background: var(--gray-50); border: 1px solid var(--gray-200); padding: 4px;
        }
        .sidebar-logo img { width: 100%; height: 100%; object-fit: contain; display: block; }
        .sidebar-brand {
            font-family: var(--font-display); font-size: 14px; font-weight: 700;
            color: var(--gray-900); white-space: nowrap;
            transition: opacity 0.15s, width 0.15s;
            overflow: hidden;
        }
        .sidebar.collapsed .sidebar-brand { opacity: 0; width: 0; }

        .sidebar-toggle {
            width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--gray-200);
            background: var(--pure-white); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--gray-500); flex-shrink: 0;
            transition: all 0.15s;
        }
        .sidebar-toggle:hover { border-color: var(--beurer-magenta); color: var(--beurer-magenta); }
        .sidebar-toggle svg { width: 14px; height: 14px; transition: transform 0.22s var(--ease-out); }
        .sidebar.collapsed .sidebar-toggle svg { transform: rotate(180deg); }

        .sidebar-nav {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            padding: 12px 8px;
            scrollbar-width: none;
        }
        .sidebar-nav::-webkit-scrollbar { display: none; }

        .sidebar-group-label {
            font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px;
            color: var(--gray-400); padding: 12px 12px 6px;
            white-space: nowrap; transition: opacity 0.15s;
        }
        .sidebar.collapsed .sidebar-group-label { opacity: 0; }

        .sidebar-nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 12px; border-radius: 8px; cursor: pointer;
            color: var(--gray-600); font-size: 13px; font-weight: 500;
            white-space: nowrap; transition: all 0.15s;
            position: relative; border: none; background: none; width: 100%;
            font-family: var(--font-text); text-align: left;
        }
        .sidebar-nav-item:hover { background: var(--gray-50); color: var(--gray-900); }
        .sidebar-nav-item.active {
            background: var(--beurer-magenta-light); color: var(--beurer-magenta); font-weight: 600;
        }
        .sidebar-nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
        .sidebar-nav-item .nav-label {
            flex: 1; overflow: hidden; text-overflow: ellipsis;
            transition: opacity 0.15s, width 0.15s;
        }
        .sidebar.collapsed .sidebar-nav-item .nav-label { opacity: 0; width: 0; }

        .nav-badge {
            font-size: 10px; font-weight: 700; padding: 1px 6px;
            border-radius: 99px; background: var(--beurer-magenta-light); color: var(--beurer-magenta);
            transition: opacity 0.15s;
        }
        .sidebar.collapsed .nav-badge { opacity: 0; position: absolute; }

        .nav-notification {
            position: absolute; right: -2px; top: -2px;
            width: 10px; height: 10px;
            background: #059669;
            border: 2px solid var(--gray-50);
            border-radius: 50%;
            animation: notifPulse 2s ease-in-out infinite;
        }
        @keyframes notifPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .sidebar.collapsed .nav-notification { right: 4px; top: 4px; }

        /* Collapsed sidebar: tooltip on hover */
        .sidebar.collapsed .sidebar-nav-item::after {
            content: attr(data-tooltip);
            position: absolute; left: calc(100% + 8px); top: 50%; transform: translateY(-50%);
            background: var(--gray-800); color: white;
            font-size: 12px; font-weight: 500; padding: 4px 10px;
            border-radius: 6px; white-space: nowrap;
            opacity: 0; pointer-events: none;
            transition: opacity 0.15s;
            z-index: 200;
        }
        .sidebar.collapsed .sidebar-nav-item:hover::after { opacity: 1; }

        .sidebar-footer {
            border-top: 1px solid var(--gray-100);
            padding: 12px; flex-shrink: 0;
        }
        .sidebar-footer-trigger {
            display: flex; align-items: center; gap: 10px;
            width: 100%; padding: 8px 10px; border-radius: 8px;
            border: 1px solid var(--gray-200); background: var(--pure-white);
            cursor: pointer; transition: all 0.15s;
            font-family: var(--font-text); font-size: 13px; font-weight: 500;
            color: var(--gray-700); text-align: left; overflow: hidden;
        }
        .sidebar-footer-trigger:hover { border-color: var(--beurer-magenta); color: var(--beurer-magenta); }
        .sidebar-footer-trigger .footer-logo {
            width: 24px; height: 24px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 11px;
            overflow: hidden; flex-shrink: 0;
        }
        .sidebar-footer-trigger .footer-logo.has-img {
            background: var(--gray-50); border: 1px solid var(--gray-200); padding: 2px;
        }
        .sidebar-footer-trigger .footer-logo img { width: 100%; height: 100%; object-fit: contain; display: block; }
        .sidebar-footer-trigger .footer-label {
            flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            transition: opacity 0.15s, width 0.15s;
        }
        .sidebar.collapsed .sidebar-footer-trigger .footer-label { opacity: 0; width: 0; }
        .sidebar-footer-trigger .footer-chevron {
            width: 14px; height: 14px; flex-shrink: 0; color: var(--gray-400);
            transition: opacity 0.15s, transform 0.2s var(--ease-out);
        }
        .sidebar.collapsed .sidebar-footer-trigger .footer-chevron { opacity: 0; }


        /* ── MAIN WRAPPER ── */
        .main-wrapper {
            flex: 1;
            margin-left: var(--sidebar-width-expanded);
            min-height: 100vh;
            display: flex; flex-direction: column;
            transition: margin-left var(--sidebar-transition);
        }
        .main-wrapper.sidebar-collapsed { margin-left: var(--sidebar-width-collapsed); }

        .content-header {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            height: var(--content-header-height);
            padding: 0 32px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--gray-200);
        }
        .content-header-left { display: flex; align-items: center; gap: 12px; }
        .content-header-title {
            font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--gray-900);
        }
        .content-header-title span { color: var(--gray-400); font-weight: 400; }
        .content-header-right { display: flex; align-items: center; gap: 12px; }

        .mobile-menu-btn {
            display: none; width: 36px; height: 36px; border-radius: 8px;
            border: 1px solid var(--gray-200); background: var(--pure-white);
            cursor: pointer; align-items: center; justify-content: center;
            color: var(--gray-600); flex-shrink: 0;
        }
        .mobile-menu-btn svg { width: 18px; height: 18px; }

        .sidebar-backdrop {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.3); z-index: 110;
            opacity: 0; transition: opacity 0.2s;
        }

        /* TOP BAR */
        .topbar {
            background: var(--pure-white);
            border-bottom: 1px solid var(--gray-200);
            padding: 0 32px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(255,255,255,0.85);
        }
        .topbar-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }
        .topbar-left { display: flex; align-items: center; gap: 16px; }
        .topbar-logo {
            width: 32px; height: 32px; border-radius: 8px;
            background: var(--gradient-magenta);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 16px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .topbar-logo.has-img {
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            padding: 4px;
        }
        .topbar-logo img {
            width: 100%; height: 100%;
            object-fit: contain;
            display: block;
        }
        .topbar-title { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--gray-900); }
        .topbar-title span { color: var(--gray-400); font-weight: 400; }
        .topbar-right { display: flex; align-items: center; gap: 12px; }
        .topbar-badge {
            font-size: 12px; font-weight: 500; padding: 4px 10px;
            border-radius: 99px; background: var(--beurer-magenta-light);
            color: var(--beurer-magenta);
        }
        .topbar-date { font-size: 13px; color: var(--gray-400); }
        .lang-toggle {
            font-family: var(--font-text); font-size: 13px; font-weight: 500;
            height: 36px; padding: 0 14px; border-radius: 99px;
            border: 1px solid var(--gray-200); background: var(--pure-white);
            color: var(--gray-600); cursor: pointer; transition: all 0.15s;
        }
        .lang-toggle:hover { border-color: var(--beurer-magenta); color: var(--beurer-magenta); }
        #marketPickerDropdown.is-us .pill-trigger { border-color: var(--beurer-magenta); color: var(--beurer-magenta); background: var(--beurer-magenta-light); }
        .market-flag-emoji { font-size: 15px; line-height: 1; }
        .pill-dropdown-option[disabled] { color: var(--gray-400); cursor: not-allowed; }
        .pill-dropdown-option[disabled]:hover { background: transparent; }
        .pill-dropdown-option .market-meta { font-size: 11px; color: var(--gray-400); margin-left: auto; margin-right: 8px; }

        .us-catalog-strip { margin-bottom: 20px; }
        .us-catalog-strip-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .us-catalog-strip-header h3 { font-family: var(--font-display); font-size: 14px; font-weight: 600; color: var(--gray-900); margin: 0; }
        .us-catalog-strip-header .us-catalog-flag { font-size: 16px; line-height: 1; }
        .us-catalog-strip-header .us-catalog-sub { font-size: 12px; color: var(--gray-500); font-weight: 400; }
        .us-catalog-tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
        .us-catalog-tile {
            background: var(--pure-white); border: 1px solid var(--gray-200); border-radius: 10px;
            padding: 12px 14px; display: flex; flex-direction: column; gap: 6px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .us-catalog-tile:hover { border-color: var(--beurer-magenta); box-shadow: 0 2px 6px rgba(198, 0, 80, 0.08); }
        .us-catalog-tile.prelaunch { background: linear-gradient(135deg, var(--pure-white) 0%, #fff7fa 100%); }
        .us-catalog-tile-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; }
        .us-catalog-tile-sku { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--gray-900); letter-spacing: -0.02em; }
        .us-catalog-tile-cat { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; padding: 2px 6px; border-radius: 4px; }
        .us-catalog-tile-cat.bp { background: #fff5f5; color: #e53e3e; }
        .us-catalog-tile-cat.tens { background: #ebf4ff; color: #3182ce; }
        .us-catalog-tile-cat.menstrual { background: #f5e9ff; color: #805ad5; }
        .us-catalog-tile-name { font-size: 11px; color: var(--gray-600); line-height: 1.35; }
        .us-catalog-tile-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; padding-top: 8px; border-top: 1px solid var(--gray-100); }
        .us-catalog-tile-metric { font-size: 11px; color: var(--gray-600); }
        .us-catalog-tile-metric strong { color: var(--gray-900); font-weight: 600; }
        .us-catalog-tile-pill { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 6px; border-radius: 10px; }
        .us-catalog-tile-pill.live { background: #e6fffa; color: #047857; }
        .us-catalog-tile-pill.prelaunch { background: #fff5f5; color: #c60050; }
        .market-banner {
            margin: 0 28px 16px; padding: 10px 14px; border-radius: 10px;
            background: var(--beurer-magenta-light); color: var(--beurer-magenta);
            font-family: var(--font-text); font-size: 13px; font-weight: 500;
            display: flex; align-items: center; gap: 10px;
        }
        .market-banner .market-banner-flag { font-size: 18px; line-height: 1; }
        .market-banner .market-banner-muted { color: var(--gray-600); font-weight: 400; margin-left: 4px; }
        .week-picker { display: none !important; }
        .pill-dropdown { position: relative; }
        .pill-trigger {
            display: inline-flex; align-items: center; gap: 8px;
            height: 36px; padding: 0 14px; border-radius: 99px;
            border: 1px solid var(--gray-200); background: var(--pure-white);
            font-family: var(--font-text); font-size: 13px; font-weight: 500;
            color: var(--gray-700); cursor: pointer; transition: all 0.15s;
            white-space: nowrap;
        }
        .pill-trigger:hover { border-color: var(--beurer-magenta); color: var(--beurer-magenta); }
        .pill-trigger svg { width: 14px; height: 14px; flex-shrink: 0; }
        .pill-trigger .pill-chevron { transition: transform 0.2s var(--ease-out); }
        .pill-dropdown.open .pill-trigger { border-color: var(--beurer-magenta); color: var(--beurer-magenta); }
        .pill-dropdown.open .pill-trigger .pill-chevron { transform: rotate(180deg); }
        .pill-dropdown-panel {
            position: absolute; top: calc(100% + 6px); right: 0;
            min-width: 260px; max-height: 320px; overflow-y: auto;
            background: var(--pure-white); border: 1px solid var(--gray-200);
            border-radius: 12px; box-shadow: var(--shadow-lg); z-index: 200;
            transform: scaleY(0); opacity: 0; transform-origin: top;
            transition: transform 0.15s var(--ease-out), opacity 0.15s var(--ease-out);
            pointer-events: none;
        }
        .pill-dropdown.open .pill-dropdown-panel {
            transform: scaleY(1); opacity: 1; pointer-events: auto;
        }
        .pill-dropdown-option {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 16px; font-size: 14px; color: var(--gray-700);
            cursor: pointer; transition: background 0.1s;
            border: none; background: none; width: 100%; text-align: left;
            font-family: var(--font-text);
        }
        .pill-dropdown-option:first-child { border-radius: 12px 12px 0 0; }
        .pill-dropdown-option:last-child { border-radius: 0 0 12px 12px; }
        .pill-dropdown-option:hover { background: var(--gray-50); }
        .pill-dropdown-option.selected { font-weight: 600; color: var(--beurer-magenta); }
        .pill-dropdown-option .check { font-size: 14px; color: var(--beurer-magenta); opacity: 0; }
        .pill-dropdown-option.selected .check { opacity: 1; }

        /* TABS */
        .tab-nav {
            background: var(--pure-white);
            border-bottom: 1px solid var(--gray-200);
            padding: 0 32px;
            position: sticky;
            top: 64px;
            z-index: 99;
        }
        .tab-nav-inner {
            display: flex;
            gap: 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .tab-btn {
            font-family: var(--font-text);
            font-size: 13px;
            font-weight: 500;
            color: var(--gray-500);
            background: none;
            border: none;
            padding: 14px 20px;
            cursor: pointer;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
            transition: all 0.2s var(--ease-out);
        }
        .tab-btn:hover { color: var(--gray-900); }
        .tab-btn.active {
            color: var(--beurer-magenta);
            border-bottom-color: var(--beurer-magenta);
            font-weight: 500;
        }

        /* CONTENT */
        .content { padding: 24px 32px 80px; flex: 1; width: 100%; }
        .tab-panel { display: none; animation: fadeIn 0.3s var(--ease-out); }
        .tab-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* SECTION */
        .section { margin-bottom: 32px; }
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
        }
        .section-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--gray-900); }
        .section-subtitle { font-size: 13px; color: var(--gray-400); margin-top: 2px; }
        .section-label {
            font-family: var(--font-text); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px;
            color: var(--gray-400); margin-bottom: 12px;
        }

        /* KPI CARDS */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        .kpi-card {
            background: var(--pure-white);
            border-radius: var(--radius-lg);
            padding: 18px 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
            transition: box-shadow 0.2s var(--ease-out);
        }
        .kpi-card:hover { box-shadow: var(--shadow-md); }
        .kpi-card.accent {
            background: var(--gradient-magenta);
            border: none;
            box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,0.15);
        }
        .kpi-card.accent .kpi-label,
        .kpi-card.accent .kpi-value,
        .kpi-card.accent .kpi-delta { color: var(--pure-white); }
        .kpi-card.accent .kpi-delta { opacity: 0.85; }
        .kpi-label { font-family: var(--font-text); font-size: 12px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
        .kpi-value { font-family: var(--font-display); font-size: 32px; font-weight: 800; color: var(--gray-900); line-height: 1.1; }
        .kpi-delta { font-size: 12px; font-weight: 600; margin-top: 6px; display: inline-flex; align-items: center; gap: 4px; padding: 2px 7px; border-radius: 99px; }
        .kpi-delta.up { color: var(--success); background: var(--success-light); }
        .kpi-delta.down { color: var(--error); background: var(--error-light); }
        .kpi-delta.neutral { color: var(--gray-400); background: var(--gray-100); }

        /* CARDS */
        .card {
            background: var(--pure-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
            overflow: hidden;
        }
        .card-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--gray-100);
        }
        .card-header h3 { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--gray-900); }
        .card-header p { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
        .card-body { padding: 20px 24px; }
        .card-body.no-pad { padding: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
        @media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

        /* INSIGHT CARDS */
        .insight-card {
            background: var(--pure-white);
            border-radius: var(--radius-md);
            padding: 20px 20px 20px 24px;
            border: 1px solid var(--gray-200);
            border-left: 3px solid var(--beurer-magenta);
            transition: all 0.2s var(--ease-out);
        }
        .insight-card:nth-child(2) { border-left-color: var(--accent-gold); }
        .insight-card:nth-child(3) { border-left-color: var(--success); }
        .insight-card:hover { box-shadow: var(--shadow-md); }
        .insight-num {
            width: 28px; height: 28px; border-radius: 8px;
            background: var(--beurer-magenta-light);
            color: var(--beurer-magenta); font-size: 13px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 12px; font-family: var(--font-display);
        }
        .insight-card:nth-child(2) .insight-num { background: var(--accent-gold-light); color: var(--accent-gold-dark); }
        .insight-card:nth-child(3) .insight-num { background: var(--success-light); color: #059669; }
        .insight-title { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--gray-900); margin-bottom: 6px; line-height: 1.4; }
        .insight-text { font-size: 13px; color: var(--gray-500); line-height: 1.5; }
        .insight-action {
            margin-top: 12px; font-size: 12px; font-weight: 600;
            color: var(--beurer-magenta); display: flex; align-items: center; gap: 4px;
        }

        /* ALERT ROW */
        .alert-list { display: flex; flex-direction: column; gap: 8px; }
        .alert-row {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 14px 16px; border-radius: var(--radius-md);
            border: 1px solid var(--gray-200); background: var(--pure-white);
        }
        .alert-row.critical { border-left: 3px solid var(--error); background: var(--error-light); }
        .alert-row.watch { border-left: 3px solid var(--warning); background: var(--warning-light); }
        .alert-row.opportunity { border-left: 3px solid var(--success); background: var(--success-light); }
        .alert-badge {
            font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
            padding: 3px 8px; border-radius: 99px; white-space: nowrap;
        }
        .alert-badge.critical { background: var(--error); color: white; }
        .alert-badge.watch { background: var(--warning); color: white; }
        .alert-badge.opportunity { background: var(--success); color: white; }
        .alert-content { flex: 1; }
        .alert-title { font-size: 13px; font-weight: 600; color: var(--gray-900); }
        .alert-desc { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
        .alert-meta { font-size: 11px; color: var(--gray-400); margin-top: 4px; }
        .alert-meta a { font-weight: 500; }
        a[target="_blank"]:hover { text-decoration: underline !important; }
        .show-more-btn {
            display: block; width: 100%; padding: 8px; margin-top: 8px;
            background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: var(--radius-sm);
            font-family: var(--font-text); font-size: 12px; font-weight: 500; color: var(--beurer-magenta);
            cursor: pointer; transition: background 0.15s ease;
        }
        .show-more-btn:hover { background: var(--beurer-magenta-light); }
        /* Interactive hover states */
        .qa-card:hover { border-color: var(--beurer-magenta); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .expandable-header:hover { background: var(--gray-50); border-radius: var(--radius-sm); }
        .content-matrix tbody tr:hover { background: var(--gray-50); }
        .strat-table tbody tr:hover { background: var(--gray-50); }
        .filter-btn { transition: all 0.15s ease; }
        .insight-card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
        .insight-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .tab-badge { font-size: 11px; color: var(--gray-400); font-weight: 400; margin-left: 2px; }

        /* QUOTE BLOCK */
        .quote-block {
            background: var(--gray-50);
            border-left: 3px solid var(--beurer-magenta);
            padding: 12px 16px;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            margin: 8px 0;
        }
        .quote-text { font-size: 13px; font-style: italic; color: var(--gray-700); line-height: 1.5; }
        .quote-source { font-size: 11px; color: var(--gray-400); margin-top: 4px; }

        /* FUNNEL */
        .funnel { display: flex; flex-direction: column; gap: 6px; padding: 16px 0; }
        .funnel-stage {
            display: flex; align-items: center; gap: 16px;
            cursor: pointer; padding: 4px 0;
            transition: all 0.2s var(--ease-out);
        }
        .funnel-stage:hover .funnel-bar { filter: brightness(1.08); }
        .funnel-label { width: 140px; text-align: right; font-size: 13px; font-weight: 500; color: var(--gray-700); flex-shrink: 0; }
        .funnel-bar-wrap { flex: 1; display: flex; align-items: center; gap: 12px; }
        .funnel-bar {
            height: 36px; border-radius: 6px;
            background: var(--gradient-magenta);
            transition: width 0.6s var(--ease-out);
            min-width: 4px;
            display: flex; align-items: center; padding-left: 12px;
        }
        .funnel-bar-text { font-size: 12px; font-weight: 700; color: white; white-space: nowrap; }
        .funnel-count { font-size: 13px; font-weight: 600; color: var(--gray-700); white-space: nowrap; }
        .funnel-pct { font-size: 12px; color: var(--gray-400); }
        .funnel-stage.s2 .funnel-bar { background: linear-gradient(135deg, var(--beurer-magenta-bright) 0%, var(--beurer-magenta) 100%); }
        .funnel-stage.s3 .funnel-bar { background: linear-gradient(135deg, #D4A574 0%, #B8956A 100%); }
        .funnel-stage.s4 .funnel-bar { background: linear-gradient(135deg, #34C759 0%, #059669 100%); }
        .funnel-stage.s5 .funnel-bar { background: linear-gradient(135deg, #007AFF 0%, #0056CC 100%); }

        /* JOURNEY STAGE DETAIL */
        .journey-stage-card {
            background: var(--pure-white);
            border-radius: var(--radius-lg);
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow-sm);
            margin-bottom: 16px;
            overflow: hidden;
        }
        .stage-header-left { display: flex; align-items: center; gap: 14px; }
        .stage-num {
            width: 36px; height: 36px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; font-weight: 700; color: white;
            background: var(--gradient-magenta);
            flex-shrink: 0;
        }
        .stage-name { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--gray-900); }
        .stage-stats { display: flex; gap: 16px; font-size: 13px; color: var(--gray-500); }
        .stage-stat b { color: var(--gray-900); }
        .stage-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px; }
        @media (max-width: 900px) { .stage-columns { grid-template-columns: 1fr; } }
        .stage-col h4 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--beurer-magenta); margin-bottom: 10px; }
        .stage-list { list-style: none; }
        .stage-list li { font-size: 13px; color: var(--gray-700); padding: 4px 0; display: flex; align-items: flex-start; gap: 8px; }
        .stage-list li::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--beurer-magenta); margin-top: 7px; flex-shrink: 0; }
        .stage-list li .count { color: var(--gray-400); font-size: 12px; }
        .content-opp {
            background: var(--beurer-magenta-light);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            margin-top: 12px;
        }
        .content-opp-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--beurer-magenta); margin-bottom: 6px; }
        .content-opp-text { font-size: 13px; font-weight: 500; color: var(--gray-900); }

        /* STRATEGY TABLE */
        .strat-table { width: 100%; border-collapse: collapse; }
        .strat-table th {
            font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--gray-400); text-align: left; padding: 10px 16px;
            border-bottom: 1px solid var(--gray-200);
        }
        .strat-table td {
            font-size: 13px; color: var(--gray-700); padding: 14px 16px;
            border-bottom: 1px solid var(--gray-100); vertical-align: top;
        }
        .strat-table tr:hover td { background: var(--gray-50); }
        .strat-table td:last-child { max-width: 300px; }
        .strat-table .bar-cell { width: 160px; }
        .mini-bar-wrap { background: var(--gray-100); border-radius: 4px; height: 8px; width: 100%; }
        .mini-bar { height: 100%; border-radius: 4px; background: var(--gradient-magenta); }
        .mini-bar.positive { background: var(--success); }
        .pos-pct { font-size: 12px; font-weight: 600; color: var(--success); }
        .neg-pct { font-size: 12px; font-weight: 600; color: var(--error); }

        /* PILL TAGS */
        .pill {
            display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px;
            border-radius: 99px; margin: 2px 2px; max-width: 100%; line-height: 1.4;
        }
        .pill.wrap { white-space: normal; word-break: break-word; border-radius: var(--radius-sm); padding: 4px 12px; }
        .pill.truncate { max-width: 280px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pill.magenta { background: var(--beurer-magenta-light); color: var(--beurer-magenta); }
        .pill.gold { background: var(--accent-gold-light); color: var(--accent-gold-dark); }
        .pill.success { background: var(--success-light); color: #059669; }
        .pill.info { background: var(--info-light); color: var(--info); }
        .pill.warning { background: var(--warning-light); color: #B45309; }
        .pill.error { background: var(--error-light); color: var(--error); }
        .pill.neutral-bg { background: var(--gray-100); color: var(--gray-500); }

        /* EXPANDABLE */
        .expandable-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px; cursor: pointer; user-select: none;
            border-bottom: 1px solid var(--gray-100);
            transition: background 0.2s var(--ease-out);
        }
        .expandable-header:hover { background: var(--gray-50); }
        .expandable-header.lg { padding: 20px 24px; }
        .expandable-header.lg h4 { font-size: 16px; }
        .expandable-header h4 { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--gray-900); display: flex; align-items: center; gap: 8px; }
        .expandable-body { max-height: 0; overflow: hidden; transition: max-height 0.4s var(--ease-out); }
        .expandable-body.open { max-height: 5000px; }
        .expandable-body-inner { padding: 16px 20px; background:var(--gray-50); border-bottom:1px solid var(--gray-200); }
        .expandable-body-inner.flush { background: none; border-bottom: none; padding: 0 24px 24px; }
        .chevron { font-size: 16px; color: var(--gray-400); transition: transform 0.3s var(--ease-out); }
        .chevron.open { transform: rotate(180deg); }

        /* CHART CANVAS */
        .chart-container { position: relative; width: 100%; min-height: 200px; }
        .chart-container.small { max-height: 260px; }
        .chart-container.doughnut { min-height: 200px; max-height: 240px; }
        .chart-container.vbar { max-height: 300px; }
        .chart-container.medium { max-height: 360px; }
        .chart-container.hbar { min-height: 200px; max-height: 500px; }

        /* BRIDGE CARD */
        .bridge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
        .bridge-card {
            background: var(--pure-white); border: 1px solid var(--gray-200);
            border-radius: var(--radius-md); padding: 16px;
            transition: all 0.2s var(--ease-out);
        }
        .bridge-card:hover { border-color: var(--beurer-magenta); box-shadow: var(--shadow-md); }
        .bridge-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--beurer-magenta); margin-bottom: 6px; }
        .bridge-flow { font-size: 14px; font-weight: 600; color: var(--gray-900); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .bridge-flow .arrow { color: var(--beurer-magenta); }
        .bridge-count { font-family: var(--font-display); font-size: 24px; font-weight: 800; color: var(--beurer-magenta); }
        .bridge-pct { font-size: 12px; color: var(--gray-400); }

        /* COMPETITOR */
        .competitor-card { padding: 16px; border-bottom: 1px solid var(--gray-100); }
        .competitor-card:last-child { border-bottom: none; }
        .competitor-name { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--gray-900); margin-bottom: 4px; }
        .competitor-mentions { font-size: 12px; color: var(--gray-500); }
        .competitor-issues { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }

        /* FOOTER */
        .dashboard-footer {
            text-align: center; padding: 32px;
            font-size: 12px; color: var(--gray-400); border-top: 1px solid var(--gray-200);
            margin-top: 48px;
        }
        .dashboard-footer strong { color: var(--gray-600); }

        /* FILTER BAR */
        .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .filter-btn {
            font-family: var(--font-text); font-size: 12px; font-weight: 500;
            padding: 6px 14px; border-radius: 99px;
            border: 1px solid var(--gray-300); background: var(--pure-white);
            color: var(--gray-600); cursor: pointer; transition: all 0.15s;
        }
        .filter-btn:hover { border-color: var(--beurer-magenta); color: var(--beurer-magenta); }
        .filter-btn.active { background: var(--beurer-magenta); color: white; border-color: var(--beurer-magenta); }

        /* SO-WHAT BOX */
        .so-what {
            background: linear-gradient(135deg, rgba(198,0,80,0.04) 0%, rgba(198,0,80,0.08) 100%);
            border: 1px solid rgba(198,0,80,0.12);
            border-radius: var(--radius-md);
            padding: 16px 20px;
            margin-top: 16px;
        }
        .so-what-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--beurer-magenta); margin-bottom: 6px; }
        .so-what-text { font-size: 13px; color: var(--gray-700); line-height: 1.5; }

        /* HEATMAP TABLE */
        .heatmap-table { width: 100%; border-collapse: collapse; }
        .heatmap-table th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; color: var(--gray-500); padding: 8px 10px; text-align: center; }
        .heatmap-table th:first-child { text-align: left; }
        .heatmap-table td { padding: 8px 10px; text-align: center; font-size: 13px; font-weight: 600; border-radius: 6px; }
        .heatmap-table td:first-child { text-align: left; font-weight: 500; color: var(--gray-700); }
        .heat-0 { color: var(--gray-300); }
        .heat-1 { background: var(--beurer-magenta-subtle); color: var(--gray-600); }
        .heat-2 { background: var(--beurer-magenta-light); color: var(--beurer-magenta); }
        .heat-3 { background: var(--brand-heat-mid, rgba(198,0,80,0.22)); color: var(--beurer-magenta); }
        .heat-4 { background: var(--brand-heat-high, rgba(198,0,80,0.35)); color: white; }
        .heat-5 { background: var(--beurer-magenta); color: white; }

        .sentiment-bar { display: flex; height: 8px; border-radius: 4px; overflow: hidden; gap: 2px; width: 120px; }
        .sentiment-bar .pos { background: var(--success); }
        .sentiment-bar .neu { background: var(--gray-300); }
        .sentiment-bar .neg { background: var(--error); }

        /* INFO TOOLTIPS */
        .info-tip { display:inline-block; cursor:pointer; position:relative; margin-left:6px; vertical-align:middle; }
        .info-tip .info-tip-icon { display:inline-flex; align-items:center; justify-content:center;
            width:18px; height:18px; border-radius:50%; background:var(--beurer-magenta-light);
            border:1px solid rgba(198,0,80,0.15);
            font-size:11px; font-weight:700; color:var(--beurer-magenta); font-style:normal; text-transform:none;
            transition:all 0.15s; }
        .info-tip .info-tip-icon:hover { background:var(--beurer-magenta); color:white; border-color:var(--beurer-magenta); }
        /* Portal tooltip — lives on document.body to avoid transform/backdrop-filter containing block issues */
        #info-tip-portal { position:fixed; z-index:10000; width:280px; max-width:calc(100vw - 24px);
            padding:12px 14px; border-radius:8px;
            background:var(--gray-800); color:white; font-size:12px; font-weight:400;
            line-height:1.5; font-style:normal; text-transform:none; letter-spacing:normal;
            box-shadow:0 4px 16px rgba(0,0,0,0.2);
            pointer-events:none; opacity:0; visibility:hidden;
            transition:opacity 0.15s, visibility 0.15s; }
        #info-tip-portal.visible { opacity:1; visibility:visible; }

        /* CONTENT MATRIX */
        th[data-tip], td[data-tip] { cursor:help; text-decoration:underline; text-decoration-style:dotted; text-underline-offset:3px; text-decoration-color:rgba(0,0,0,0.25); }
        .content-matrix { width:100%; border-collapse:collapse; }
        .content-matrix th { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.3px;
            color:var(--gray-500); padding:10px 12px; text-align:left; cursor:pointer; white-space:nowrap;
            border-bottom:2px solid var(--gray-200); user-select:none; }
        .content-matrix th:hover { color:var(--beurer-magenta); }
        .content-matrix th .sort-arrow { font-size:10px; margin-left:4px; }
        .content-matrix td { padding:10px 12px; font-size:13px; color:var(--gray-700); border-bottom:1px solid var(--gray-100);
            vertical-align:top; }
        .gap-bar { display:inline-flex; align-items:center; gap:8px; }
        .gap-bar-track { width:80px; height:8px; background:var(--gray-100); border-radius:4px; overflow:hidden; }
        .gap-bar-fill { height:100%; border-radius:4px; background:var(--beurer-magenta); min-width:3px; }
        .priority-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
        .priority-dot.high { background:var(--error); }
        .priority-dot.medium { background:var(--warning); }
        .priority-dot.low { background:var(--gray-300); }
        .kw-tag { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px;
            background:var(--gray-50); border:1px solid var(--gray-200); color:var(--gray-600); margin:2px; }

        /* Unified Content Layout */
        .unified-content-layout {
          display: flex;
          gap: 0;
          width: 100%;
          min-height: 500px;
        }
        .unified-content-layout .unified-content-list {
          flex: 1;
          min-width: 0;
        }
        /* Article Modal Nav Bar (article selector at top of modal) */
        .article-modal-nav {
          display: flex;
          align-items: center;
          gap: 10px;
          padding: 8px 16px;
          background: var(--gray-50);
          border-bottom: 1px solid var(--gray-200);
          font-size: 12px;
          flex-shrink: 0;
        }
        .article-modal-nav button {
          background: var(--white);
          border: 1px solid var(--gray-200);
          border-radius: 4px;
          padding: 4px 10px;
          cursor: pointer;
          font-size: 11px;
          color: var(--gray-600);
        }
        .article-modal-nav button:hover {
          background: var(--gray-100);
        }
        .article-modal-nav button:disabled {
          opacity: 0.35;
          cursor: default;
        }
        .article-modal-nav select {
          flex: 1;
          font-size: 11px;
          padding: 4px 8px;
          border: 1px solid var(--gray-200);
          border-radius: 4px;
          background: var(--white);
          min-width: 0;
          max-width: 400px;
        }
        .article-modal-nav .nav-label {
          color: var(--gray-500);
          font-size: 10px;
          text-transform: uppercase;
          letter-spacing: 0.5px;
        }

        /* Unified Content Header */
        .unified-content-header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 16px;
        }

        /* Section Headers */
        .section-header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 8px 0;
          margin-bottom: 8px;
          font-size: 12px;
          font-weight: 600;
          text-transform: uppercase;
          letter-spacing: 0.5px;
          color: var(--gray-500);
          border-bottom: 1px solid var(--gray-100);
        }

        /* Add Topic Modal */
        #add-topic-modal-overlay {
          display: none;
          position: fixed; inset: 0; z-index: 10001;
          background: rgba(0,0,0,.45); backdrop-filter: blur(2px);
          align-items: center; justify-content: center;
        }
        #add-topic-modal-overlay.active { display: flex; }
        .add-topic-modal {
          background: #fff; border-radius: 10px;
          box-shadow: 0 16px 48px rgba(0,0,0,.2);
          width: 480px; max-width: 94vw;
          overflow: hidden;
        }
        .add-topic-modal-header {
          padding: 18px 24px 14px;
          border-bottom: 1px solid var(--gray-100);
          font-size: 16px; font-weight: 600; color: #111;
        }
        .add-topic-modal-body { padding: 20px 24px; }
        .add-topic-modal-body .field { margin-bottom: 16px; }
        .add-topic-modal-body .field:last-child { margin-bottom: 0; }
        .add-topic-modal-body label {
          display: block; font-size: 11px; font-weight: 600;
          color: var(--gray-500); text-transform: uppercase;
          letter-spacing: 0.5px; margin-bottom: 6px;
        }
        .add-topic-modal-body input,
        .add-topic-modal-body select,
        .add-topic-modal-body textarea {
          width: 100%; font-size: 13px; padding: 8px 12px;
          border: 1px solid var(--gray-200); border-radius: 6px;
          background: var(--white); box-sizing: border-box;
          font-family: inherit;
        }
        .add-topic-modal-body textarea { resize: vertical; min-height: 60px; }
        .add-topic-modal-body input:focus,
        .add-topic-modal-body select:focus,
        .add-topic-modal-body textarea:focus {
          border-color: #DD0000; outline: none;
        }
        .add-topic-modal-body .product-chips {
          display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px;
        }
        .add-topic-modal-body .product-chip {
          font-size: 11px; padding: 3px 10px; border-radius: 12px;
          border: 1px solid var(--gray-200); cursor: pointer;
          background: var(--white); color: var(--gray-600);
          transition: all 0.15s ease;
        }
        .add-topic-modal-body .product-chip.selected {
          background: #DD0000; color: white; border-color: #DD0000;
        }
        .add-topic-modal-body .product-chip:hover {
          border-color: #DD0000;
        }
        .add-topic-modal-footer {
          padding: 14px 24px; border-top: 1px solid var(--gray-100);
          display: flex; justify-content: flex-end; gap: 10px;
        }
        .add-topic-modal-footer button {
          padding: 8px 20px; border-radius: 6px; font-size: 13px;
          font-weight: 500; cursor: pointer;
        }
        .add-topic-modal-footer .cancel-btn {
          background: var(--white); border: 1px solid var(--gray-200); color: var(--gray-600);
        }
        .add-topic-modal-footer .cancel-btn:hover { background: var(--gray-50); }
        .add-topic-modal-footer .submit-btn {
          background: #DD0000; border: 1px solid #DD0000; color: white;
        }
        .add-topic-modal-footer .submit-btn:hover { background: #a80043; }
        .add-topic-modal-footer .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .add-topic-delete {
          background: none;
          border: none;
          color: var(--gray-400);
          cursor: pointer;
          padding: 2px 6px;
          font-size: 14px;
          line-height: 1;
        }
        .add-topic-delete:hover {
          color: #dc2626;
        }

        /* Row highlight when selected */
        .content-matrix tr.selected-row {
          background: var(--gray-50) !important;
          outline: 2px solid #DD0000;
          outline-offset: -2px;
        }

        /* No charts fallback */
        .no-chartjs { text-align: center; padding: 40px; color: var(--gray-400); font-size: 13px; }

        /* Aspect sentiment bars (horizontal stacked) */
        .aspect-bar-wrap { display:flex; height:20px; border-radius:4px; overflow:hidden; }
        .aspect-bar-pos { background:var(--success); }
        .aspect-bar-neu { background:var(--gray-300); }
        .aspect-bar-neg { background:var(--error); }

        /* Emotion/intent badges */
        .emotion-badge, .intent-badge {
            display:inline-block; padding:2px 8px; border-radius:10px;
            font-size:11px; font-weight:600; margin:2px;
        }
        .emotion-badge { background:#FFF3E0; color:#E65100; }
        .intent-badge { background:#E8EAF6; color:#283593; }

        /* Medication class groups */
        .med-class-group { margin-bottom:16px; }
        .med-class-label { font-weight:700; font-size:14px; margin-bottom:8px;
            padding:6px 12px; background:var(--gray-50); border-radius:6px; }

        /* Pain breakdown mini-bars */
        .pain-mini-bar { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
        .pain-mini-bar .label { font-size:12px; width:160px; flex-shrink:0; overflow:hidden;
            text-overflow:ellipsis; white-space:nowrap; }
        .pain-mini-bar .bar-track { flex:1; height:14px; background:var(--gray-100); border-radius:3px; overflow:hidden; }
        .pain-mini-bar .bar-fill { height:100%; background:var(--beurer-magenta); border-radius:3px;
            min-width:4px; transition:width 0.3s; }
        .pain-mini-bar .count { font-size:12px; color:var(--gray-500); min-width:60px; text-align:right; flex-shrink:0; }

        /* Journey spine expanded sections */
        .spine-section { margin-top:12px; padding-top:12px; border-top:1px solid var(--gray-100); }
        .spine-section h5 { font-size:13px; color:var(--gray-500); margin-bottom:8px;
            text-transform:uppercase; letter-spacing:0.5px; }
        .spine-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        @media (max-width: 900px) { .spine-grid { grid-template-columns:1fr; } }

        /* Quote blocks in journey spine */
        .spine-quote { background:var(--gray-50); border-left:3px solid var(--beurer-magenta);
            padding:8px 12px; margin:6px 0; border-radius:0 6px 6px 0; font-size:12px; }
        .spine-quote .q-source { color:var(--gray-400); font-size:11px; margin-top:4px; }

        /* Q&A Thread Tab */
        .qa-filter-chips { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
        .qa-chip { font-size:12px; padding:4px 12px; border-radius:20px; border:1px solid var(--gray-200);
            background:white; cursor:pointer; transition:all 0.2s; color:var(--gray-600); }
        .qa-chip.active { background:var(--beurer-magenta); color:white; border-color:var(--beurer-magenta); }
        #qaThreadList { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
        @media (max-width: 900px) { #qaThreadList { grid-template-columns:1fr; } }
        .qa-card { background:white; border-radius:12px; padding:14px 16px;
            border:1px solid var(--gray-100); cursor:pointer; transition:box-shadow 0.2s; }
        .qa-card:hover { box-shadow:0 2px 8px rgba(0,0,0,0.06); }
        .qa-card.expanded { cursor:default; grid-column:1/-1; }
        .qa-question-title { font-size:14px; font-weight:600; color:var(--gray-800); line-height:1.4;
            display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
        .qa-card.expanded .qa-question-title { -webkit-line-clamp:unset; overflow:visible; }
        .qa-meta-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; align-items:center; }
        .qa-source-badge { font-size:11px; padding:2px 8px; border-radius:20px; background:var(--gray-100); color:var(--gray-600); }
        .qa-answers-section { margin-top:16px; padding-top:16px; border-top:1px solid var(--gray-100); }
        .qa-answer-card { background:var(--gray-50); border-radius:8px; padding:12px; margin-bottom:8px; }
        .qa-answer-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
        .qa-accepted { color:var(--success); font-weight:700; font-size:12px; }
        .qa-votes-badge { font-size:11px; color:var(--gray-400); }
        .qa-analysis-box { background:linear-gradient(135deg, #f8f0ff, #fff0f5); border-radius:8px;
            padding:16px; margin-top:12px; border-left:3px solid var(--beurer-magenta); }
        .qa-analysis-label { font-size:11px; font-weight:700; color:var(--beurer-magenta);
            text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
        .qa-analysis-text { font-size:13px; color:var(--gray-700); line-height:1.5; }
        .qa-action-box { background:var(--gray-50); border-radius:8px; padding:12px; margin-top:8px; }
        .qa-action-label { font-size:11px; font-weight:700; color:var(--success);
            text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }

        /* Bridge card Q&A */
        .qa-thread { border-top:1px solid var(--gray-100); padding-top:10px; margin-top:10px; }
        .qa-thread .qa-question { display:flex; gap:8px; align-items:flex-start; margin-bottom:8px; }
        .qa-thread .qa-answer { display:flex; gap:8px; align-items:flex-start; padding-left:4px; margin-bottom:6px; }
        .qa-answer-body { display:flex; flex-direction:column; }
        .qa-icon { display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px;
            min-width:20px; border-radius:4px; font-size:11px; font-weight:700;
            background:var(--beurer-magenta); color:white; flex-shrink:0; }
        .qa-icon.qa-a { background:var(--gray-200); color:var(--gray-700); }
        .qa-text { font-size:12px; color:var(--gray-600); line-height:1.4; }
        .qa-meta { font-size:11px; color:var(--gray-400); margin-top:2px; }
        .qa-more { font-size:11px; color:var(--beurer-magenta); padding-left:28px; margin-top:4px; }
        .qa-show-more-btn { display:block; margin:16px auto; padding:10px 24px; border-radius:8px;
            border:1px solid var(--gray-200); background:white; cursor:pointer; font-size:13px;
            color:var(--gray-600); transition:all 0.2s; }
        .qa-show-more-btn:hover { border-color:var(--beurer-magenta); color:var(--beurer-magenta); }

        /* Bridge badges in Q&A */
        .bridge-badge { font-size:10px; padding:2px 8px; border-radius:20px; background:rgba(212,165,116,0.15); color:#B8956A; font-weight:600; }
        .bridge-summary-bar { display:flex; align-items:center; gap:12px; padding:12px 16px; background:rgba(212,165,116,0.08);
            border-radius:10px; margin-bottom:16px; flex-wrap:wrap; }
        .bridge-summary-bar .bridge-total { font-size:13px; font-weight:600; color:var(--gray-700); }
        .bridge-summary-bar .bridge-pill { font-size:11px; padding:3px 10px; border-radius:20px; background:rgba(212,165,116,0.2); color:#8B6914; }
        .qa-chip.bridge-chip { border-color:rgba(212,165,116,0.4); color:#8B6914; }
        .qa-chip.bridge-chip.active { background:#D4A574; color:white; border-color:#D4A574; }
        .qa-filter-separator { width:1px; height:20px; background:var(--gray-200); margin:0 4px; }

        /* ── BRAND/TOPIC SENTIMENT BARS ── */
        .dual-sentiment-section { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        @media (max-width: 900px) { .dual-sentiment-section { grid-template-columns: 1fr; } }
        .sentiment-card { background: var(--pure-white); border-radius: var(--radius-lg); padding: 18px 20px; box-shadow: var(--shadow-sm); border: 1px solid var(--gray-200); }
        .sentiment-card-label { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--gray-900); margin-bottom: 2px; display: flex; align-items: center; gap: 6px; }
        .sentiment-card-sublabel { font-size: 11px; color: var(--gray-400); margin-bottom: 12px; }
        .sentiment-stacked-bar { display: flex; height: 24px; border-radius: 6px; overflow: hidden; gap: 2px; width: 100%; }
        .sentiment-stacked-bar .seg { display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; min-width: 20px; transition: width 0.5s var(--ease-out); }
        .sentiment-stacked-bar .seg.pos { background: var(--success); }
        .sentiment-stacked-bar .seg.neu { background: var(--gray-300); color: var(--gray-600); }
        .sentiment-stacked-bar .seg.neg { background: var(--error); }
        .sentiment-stacked-bar .seg.unclass { background: var(--gray-200); color: var(--gray-500); }
        .sentiment-legend { display: flex; gap: 12px; margin-top: 8px; font-size: 11px; color: var(--gray-500); flex-wrap: wrap; }
        .sentiment-legend span { display: flex; align-items: center; gap: 4px; }
        .sentiment-legend .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

        /* ── PURCHASE INTENT FEED ── */
        .pi-feed-list { display: flex; flex-direction: column; gap: 10px; }
        .pi-feed-card { background: var(--pure-white); border-radius: var(--radius-md); padding: 14px 16px 14px 20px; border: 1px solid var(--gray-200); border-left: 3px solid var(--beurer-magenta); transition: all 0.2s var(--ease-out); }
        .pi-feed-card:hover { box-shadow: var(--shadow-md); }
        .pi-feed-title { font-size: 13px; font-weight: 600; color: var(--gray-900); margin-bottom: 6px; }
        .pi-feed-title a { color: inherit; text-decoration: none; }
        .pi-feed-title a:hover { color: var(--beurer-magenta); }
        .pi-feed-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .pi-feed-products { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }

        /* ── COMPETITOR GAPS CARD ── */
        .comp-gap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
        @media (max-width: 900px) { .comp-gap-grid { grid-template-columns: 1fr; } }
        @media (max-width: 900px) {
            #tab-media [style*="grid-template-columns:1fr 1fr"] {
                grid-template-columns: 1fr !important;
            }
        }
        .comp-gap-card { background: var(--pure-white); border-radius: var(--radius-md); border: 1px solid var(--gray-200); overflow: hidden; transition: all 0.2s var(--ease-out); }
        .comp-gap-card:hover { box-shadow: var(--shadow-md); }
        .comp-gap-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--gray-100); }
        .comp-gap-header .comp-name { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--gray-900); }
        .comp-gap-body { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
        .comp-gap-side { padding: 12px 16px; }
        .comp-gap-side.weakness { background: var(--error-light); border-right: 1px solid var(--gray-100); }
        .comp-gap-side.advantage { background: var(--success-light); }
        .comp-gap-side-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .comp-gap-side.weakness .comp-gap-side-label { color: var(--error); }
        .comp-gap-side.advantage .comp-gap-side-label { color: #059669; }
        .comp-gap-quote { font-size: 12px; font-style: italic; color: var(--gray-600); line-height: 1.4; margin-top: 6px; }
        .comp-gap-footer { padding: 10px 16px; border-top: 1px solid var(--gray-100); display: flex; align-items: center; gap: 8px; }
        .opp-score-bar { flex: 1; height: 6px; background: var(--gray-100); border-radius: 3px; overflow: hidden; }
        .opp-score-fill { height: 100%; border-radius: 3px; background: var(--beurer-magenta); }

        /* ── TOAST ── */
        .toast-notification {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: var(--gray-800); color: white; padding: 10px 20px;
            border-radius: 8px; font-size: 13px; font-weight: 500;
            box-shadow: var(--shadow-lg); z-index: 10001;
            animation: toastIn 0.3s var(--ease-out);
        }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        /* ── RELEVANCE BADGE ── */
        .relevance-badge {
            font-size: 10px; font-weight: 700; padding: 2px 8px;
            border-radius: 99px; white-space: nowrap; display: inline-block;
        }
        .relevance-badge.high { background: var(--success-light); color: #059669; }
        .relevance-badge.medium { background: var(--warning-light); color: #B45309; }
        .relevance-badge.low { background: var(--gray-100); color: var(--gray-500); }


        /* ── EXPORT BUTTONS ── */
        .export-buttons { display: flex; gap: 4px; margin-left: 4px; }
        .export-btn {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 10px; border: 1px solid var(--gray-200); border-radius: var(--radius-sm);
            background: white; color: var(--gray-600); font-size: 12px; font-weight: 500;
            cursor: pointer; transition: all 0.15s;
        }
        .export-btn:hover { border-color: var(--beurer-magenta); color: var(--beurer-magenta); }
        .export-btn svg { flex-shrink: 0; }

        /* ── SOURCE BIAS BANNER ── */
        .source-bias-banner {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 16px 8px calc(var(--sidebar-w) + 24px);
            background: #FEF3C7; border-bottom: 1px solid #FDE68A;
            font-size: 13px; color: #92400E; line-height: 1.4;
        }
        .source-bias-banner svg { flex-shrink: 0; }
        @media (max-width: 768px) { .source-bias-banner { padding-left: 16px; } }

        /* ── PRINT STYLESHEET ── */
        @media print {
            .sidebar, .sidebar-backdrop, .content-header, .mobile-menu-btn,
            .lang-toggle, .pill-dropdown, .filter-bar, .category-filter-bar,
            .show-more-btn, .qa-show-more-btn,
            .gen-article-btn, .topbar-badge, .welcome-card, .tab-nav,
            .export-buttons, .source-bias-banner,
            .info-tip, .info-tip-icon,
            #live-data-banner, #info-tip-portal, #sourceBiasBanner { display: none !important; }
            body { display: block; background: white; }
            .main-wrapper { margin-left: 0 !important; }
            .content { padding: 16px; }
            /* Only print the active tab */
            .tab-panel { display: none !important; }
            .tab-panel.active { display: block !important; }
            .kpi-grid { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .card { box-shadow: none; border: 1px solid var(--gray-300); page-break-inside: avoid; }
            .expandable-body { max-height: none !important; }
            /* Chart containers: show print images, hide canvases */
            .chart-container canvas { display: none !important; }
            .chart-container .chart-print-img { display: block !important; max-width: 100%; height: auto; margin: 0 auto; }
            .chart-container { break-inside: avoid; }
            a { text-decoration: none; color: inherit; }
            /* Show dashboard title in print */
            .content-header { display: block !important; }
            .content-header .export-buttons, .content-header .lang-toggle, .content-header .pill-dropdown { display: none !important; }
            /* Breadcrumb back links not needed in print */
            [onclick*="activateSidebarTab"] { display: none !important; }
            /* Tighten spacing */
            .section { page-break-inside: avoid; }
            .alert-row, .insight-card { page-break-inside: avoid; }
        }

        /* ── FOCUS STYLES ── */
        :focus-visible { outline: 2px solid var(--beurer-magenta); outline-offset: 2px; }
        :focus:not(:focus-visible) { outline: none; }

        /* ── ANIMATIONS ── */
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .tab-panel.active { animation: fadeSlideIn 0.35s var(--ease-out); }
        .tab-panel.active .kpi-card,
        .tab-panel.active .card,
        .tab-panel.active .insight-card {
            animation: cardIn 0.4s var(--ease-out) both;
        }
        .tab-panel.active .kpi-card:nth-child(1) { animation-delay: 0.04s; }
        .tab-panel.active .kpi-card:nth-child(2) { animation-delay: 0.08s; }
        .tab-panel.active .kpi-card:nth-child(3) { animation-delay: 0.12s; }
        .tab-panel.active .kpi-card:nth-child(4) { animation-delay: 0.16s; }
        .tab-panel.active .kpi-card:nth-child(5) { animation-delay: 0.20s; }
        .tab-panel.active .card:nth-child(1) { animation-delay: 0.10s; }
        .tab-panel.active .card:nth-child(2) { animation-delay: 0.15s; }
        .tab-panel.active .insight-card:nth-child(1) { animation-delay: 0.06s; }
        .tab-panel.active .insight-card:nth-child(2) { animation-delay: 0.12s; }
        .tab-panel.active .insight-card:nth-child(3) { animation-delay: 0.18s; }
        /* Suppress animations during filter updates (class toggled by JS) */
        .tab-panel.no-animate .kpi-card,
        .tab-panel.no-animate .card,
        .tab-panel.no-animate .insight-card { animation: none !important; }
        .tab-panel.no-animate { animation: none !important; }

        .sentiment-bar .pos, .sentiment-bar .neu, .sentiment-bar .neg { transition: width 0.5s var(--ease-out); }
        .funnel-bar { transition: width 0.6s var(--ease-out); }
        .kpi-card { transition: transform 0.2s var(--ease-out), box-shadow 0.2s var(--ease-out); }
        .kpi-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .kpi-card.accent:hover { box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255,255,255,0.15); }

        /* Chart skeleton pulse */
        .chart-container canvas[width="0"] + .chart-skeleton,
        .chart-container:empty::before {
            content: ''; display: block; width: 100%; height: 200px;
