function toggleLanguage() {
    // Remember active tab so re-render doesn't reset to Overview
    const activeBtn = document.querySelector('.sidebar-nav-item.active');
    const activeTab = activeBtn ? activeBtn.dataset.tab : 'overview';
    currentLang = currentLang === 'de' ? 'en' : 'de';
    const url = new URL(window.location.href);
    // Language only affects UI labels — no need to refetch data.
    // Just re-render with new translations and preserve active tab.
    renderDashboard(currentLang, activeTab);
    url.searchParams.set('lang', currentLang);
    history.replaceState(null, '', url.toString());
}

const MARKET_OPTIONS = [
    { code: 'DE', flag: '🇩🇪', label: 'Germany', lang: 'de', enabled: true },
    { code: 'US', flag: '🇺🇸', label: 'United States', lang: 'en', enabled: true },
    { code: 'UK', flag: '🇬🇧', label: 'United Kingdom', lang: 'en', enabled: false, note: 'Coming soon' },
    { code: 'FR', flag: '🇫🇷', label: 'France', lang: 'fr', enabled: false, note: 'Coming soon' },
    { code: 'NL', flag: '🇳🇱', label: 'Netherlands', lang: 'en', enabled: false, note: 'Coming soon' }
];

function switchMarket(code) {
    const opt = MARKET_OPTIONS.find(o => o.code === code);
    if (!opt || !opt.enabled) return;
    if (code === currentMarket) return;
    const activeBtn = document.querySelector('.sidebar-nav-item.active');
    const activeTab = activeBtn ? activeBtn.dataset.tab : 'overview';
    currentMarket = code;
    try { localStorage.setItem('beurer_market', currentMarket); } catch (_) {}
    currentLang = opt.lang;
    const url = new URL(window.location.href);
    url.searchParams.set('market', currentMarket);
    url.searchParams.set('lang', currentLang);
    history.replaceState(null, '', url.toString());
    renderDashboard(currentLang, activeTab);
}

/* ── PRINT PREPARATION ── */
window.addEventListener('beforeprint', () => {
    // Expand all collapsed sections in the active tab
    document.querySelectorAll('.tab-panel.active .expandable-body:not(.open)').forEach(body => {
        body.classList.add('open');
        body._printOpened = true;
    });
    // Convert Chart.js canvases to static images for PDF/print
    document.querySelectorAll('.chart-container canvas').forEach(canvas => {
        try {
            const chartInstance = Chart.getChart(canvas);
            if (!chartInstance) return;
            const img = document.createElement('img');
            img.src = chartInstance.toBase64Image();
            img.className = 'chart-print-img';
            img.style.display = 'none'; // hidden on screen, shown by @media print
            canvas.parentNode.insertBefore(img, canvas.nextSibling);
        } catch (e) { /* skip unreadable canvases */ }
    });
});
window.addEventListener('afterprint', () => {
    document.querySelectorAll('.expandable-body').forEach(body => {
        if (body._printOpened) { body.classList.remove('open'); delete body._printOpened; }
    });
    // Remove temporary print images
    document.querySelectorAll('.chart-print-img').forEach(img => img.remove());
});


/* ═══════════════════════════════════════════════════════════
   TOOLTIP PORTAL — global, registered once, outside renderDashboard
   Appends a single tooltip element to document.body so it's never
   trapped inside a parent with transform/backdrop-filter.
   ═══════════════════════════════════════════════════════════ */
(function initTooltipPortal() {
    const portal = document.createElement('div');
    portal.id = 'info-tip-portal';
    document.body.appendChild(portal);

    function showPortal(el) {
        const tipText = el.getAttribute('data-tip');
        if (!tipText) return;
        portal.textContent = tipText;
        // Measure off-screen first
        portal.style.left = '-9999px';
        portal.style.top = '-9999px';
        portal.classList.add('visible');
        const tipW = portal.offsetWidth;
        const tipH = portal.offsetHeight;
        portal.classList.remove('visible');
        // Position relative to element
        const rect = el.getBoundingClientRect();
        let left = rect.left + rect.width / 2 - tipW / 2;
        left = Math.max(8, Math.min(left, window.innerWidth - tipW - 8));
        let top;
        if (rect.top > tipH + 12) {
            top = rect.top - tipH - 8;
        } else {
            top = rect.bottom + 8;
        }
        // Clamp vertically so it never overflows viewport
        top = Math.max(8, Math.min(top, window.innerHeight - tipH - 8));
        portal.style.left = left + 'px';
        portal.style.top = top + 'px';
        portal.classList.add('visible');
    }

    function hidePortal() {
        portal.classList.remove('visible');
    }

    function findTipTarget(e) {
        return e.target.closest('.info-tip-icon') || e.target.closest('[data-tip]');
    }

    document.addEventListener('mouseover', function(e) {
        const el = findTipTarget(e);
        if (el) showPortal(el);
    });
    document.addEventListener('mouseout', function(e) {
        const el = findTipTarget(e);
        if (el && !el.contains(e.relatedTarget)) hidePortal();
    });
    document.addEventListener('focusin', function(e) {
        const el = findTipTarget(e);
        if (el) showPortal(el);
    });
    document.addEventListener('focusout', function(e) {
        const el = findTipTarget(e);
        if (el) hidePortal();
    });
})();
