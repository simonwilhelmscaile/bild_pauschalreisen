  html += '<th style="width:120px;">Action</th>';
  html += '</tr></thead><tbody>';

  for (const o of items) {
    const isCustom = o.custom === true;
    const gapColor = o.gap_score >= 7 ? 'var(--error)' : o.gap_score >= 4 ? 'var(--warning)' : 'var(--gray-300)';
    const priorityColor = isCustom ? 'var(--gray-300)' : gapColor;
    const articleInfo = o.article_id ? generatedArticles.get(o.source_item_id) || { articleId: o.article_id, status: o.article_status } : null;
    const hasArticle = articleInfo && (articleInfo.status === 'completed' || articleInfo.status === 'generating' || articleInfo.status === 'failed');
    const rowClass = (window._selectedArticleId && articleInfo && articleInfo.articleId === window._selectedArticleId) ? ' class="selected-row"' : '';
    const rowClick = articleInfo && articleInfo.articleId ? ` onclick="openSidePanel('${articleInfo.articleId}')" style="cursor:pointer;"` : '';

    // Get cached article for review/reviewer data and products
    const cachedArticle = (window._cachedArticles || []).find(a => a.id === (articleInfo && articleInfo.articleId));

    // Products: extract Beurer SKUs (BM/BC/EM/IL) from the article body.
    // Falls back to social_context / opportunity mentions when no article body exists yet.
    const bodySkus = extractBeurerSkusFromArticle(cachedArticle && cachedArticle.article_json);
    const rawProducts = bodySkus.length > 0
      ? bodySkus
      : (cachedArticle && cachedArticle.social_context && cachedArticle.social_context.products && cachedArticle.social_context.products.length > 0)
        ? cachedArticle.social_context.products
        : (cachedArticle && cachedArticle.social_context && cachedArticle.social_context.product_mentions && cachedArticle.social_context.product_mentions.length > 0)
          ? cachedArticle.social_context.product_mentions
          : (o.product_mentions || []);
    const products = filterProductsByMarket(rawProducts);

    html += '<tr' + rowClass + rowClick + '>';
    html += '<td>' + (o.url && !isCustom ? '<a href="' + esc(o.url) + '" target="_blank" style="color:inherit;text-decoration:none;">' : '') +
            esc((o.topic || o.keyword || 'Untitled').substring(0, 80)) +
            (o.url && !isCustom ? ' ↗</a>' : '') + '</td>';
    const effectiveCategory = (o.category && categoryLabels[o.category]) ? o.category : deriveCategoryFromKeyword(o.keyword || o.topic);
    html += '<td><span class="cat-badge" style="color:' + (categoryColors[effectiveCategory] || '#718096') + '">' + (categoryLabels[effectiveCategory] || effectiveCategory || 'Other') + '</span></td>';
    const productsCellEmpty = currentMarket === 'US' && rawProducts.length > 0 && products.length === 0;
    html += '<td>' + (products.length > 0
      ? products.slice(0, 3).map(p => '<span class="kw-tag">' + esc(p) + '</span>').join('')
      : (productsCellEmpty ? '<span style="color:var(--gray-400);font-size:11px;">— not in US catalog —</span>' : '')) + '</td>';

    // Status
    const statusColors = { completed: '#059669', generating: '#6366f1', failed: '#dc2626', pending: '#718096' };
    const st = articleInfo ? articleInfo.status : 'pending';
    html += '<td><span style="font-size:10px;padding:2px 6px;border-radius:8px;background:' + (statusColors[st] || '#718096') + '20;color:' + (statusColors[st] || '#718096') + ';">' + (st.charAt(0).toUpperCase() + st.slice(1)) + '</span></td>';

    // Review status
    const reviewSt = cachedArticle ? cachedArticle.review_status : '';
    html += '<td><span class="review-badge" data-status="' + reviewSt + '">' + (reviewSt ? reviewSt.charAt(0).toUpperCase() + reviewSt.slice(1) : '') + '</span></td>';

    // Quality indicator
    var quality = showArticleColumns ? computeQualityIndicators(cachedArticle ? cachedArticle.article_json : null) : null;
    html += '<td style="text-align:center;">' + renderQualityBadge(quality) + '</td>';

    // Reviewers (comment authors)
    const reviewers = cachedArticle && cachedArticle.comment_authors ? cachedArticle.comment_authors : [];
    html += '<td style="font-size:10px;">' + (reviewers.length > 0
      ? reviewers.map(r => '<span title="' + esc(r) + '" style="display:inline-block;width:22px;height:22px;border-radius:50%;background:var(--gray-200);color:var(--gray-600);font-size:9px;font-weight:600;line-height:22px;text-align:center;margin-right:2px;">' + esc(r.split(' ').map(w => w[0]).join('')) + '</span>').join('')
      : '') + '</td>';

    // Action column
    if (hasArticle && articleInfo.status === 'completed') {
      html += '<td><button class="gen-article-btn view" onclick="event.stopPropagation();openSidePanel(\'' + articleInfo.articleId + '\')">View Article</button></td>';
    } else if (hasArticle && articleInfo.status === 'generating') {
      html += '<td><button class="gen-article-btn generating" disabled>Generating...</button></td>';
    } else if (hasArticle && articleInfo.status === 'failed') {
      html += '<td><button class="gen-article-btn failed" ' + buildGenBtnAttrs(o) + ' onclick="handleGenerateArticle(this)">Retry</button></td>';
    } else {
      html += '<td><div style="display:flex;gap:4px;align-items:center;">';
      html += '<button class="gen-article-btn" ' + buildGenBtnAttrs(o) + ' onclick="handleGenerateArticle(this)">Generate Article</button>';
      if (isCustom) {
        html += '<button class="add-topic-delete" onclick="deleteCustomTopic(\'' + (o.custom_topic_id || o.article_id) + '\')" title="Delete">✕</button>';
      }
      html += '</div></td>';
    }

    html += '</tr>';
  }

  html += '</tbody></table>';
  return html;
}

function buildGenBtnAttrs(o) {
  const ctx = JSON.stringify({
    topic: o.topic || '',
    category: o.category || '',
    emotion: o.emotion || '',
    intent: o.intent || '',
    key_insight: o.key_insight || '',
    llm_opportunity: o.llm_opportunity || '',

    product_mentions: o.product_mentions || [],
    custom: o.custom || false,
    custom_notes: (o.social_context && o.social_context.custom_notes) || o.content_snippet || '',
  }).replace(/"/g, '&quot;');

  return 'data-source-item-id="' + (o.source_item_id || '') + '" ' +
         'data-keyword="' + ((o.topic || '').substring(0, 120)).replace(/"/g, '&quot;') + '" ' +
         'data-context="' + ctx + '" ' +

function renderUnifiedContentView() {
  const container = document.getElementById('content-tab-content');
  if (!container) return;

  // In US market mockup mode, swap opportunities to the US mock set and

  const isUsMock = currentMarket === 'US';

    ? (Array.isArray(US_MOCK_CONTENT_OPPS) ? US_MOCK_CONTENT_OPPS : [])

  const oppsWithArticles = allOpps.filter(o => {
    const info = generatedArticles.get(o.source_item_id);
    const status = (info && info.status) || o.article_status;
    return status === 'completed' || status === 'generating';
  });

  // Also include any cached articles not already represented via opportunities
  const oppArticleIds = new Set(oppsWithArticles.map(o => o.article_id).filter(Boolean));
  const cachedArticles = isUsMock ? [] : (window._cachedArticles || []);
  const extraArticles = cachedArticles
    .filter(a => !oppArticleIds.has(a.id) && (a.status === 'completed' || a.status === 'generating'))
    .map(a => ({
      source_item_id: a.source_item_id || null,
      topic: a.headline || a.keyword || 'Untitled',

      category: (a.social_context && a.social_context.category) || null,
      gap_score: (a.social_context && a.social_context.gap_score) || 0,
      source: a.source_item_id ? '' : 'Custom',
      url: null,
      content_snippet: '',
      keywords: [],
      product_mentions: (a.social_context && a.social_context.product_mentions) || [],
      article_id: a.id,
      article_status: a.status,
      article_headline: a.headline,
      custom: !a.source_item_id,
    }));

  const withArticles = [...oppsWithArticles, ...extraArticles];

  // Topics without articles — for the add-topic form
  const withoutArticles = allOpps.filter(o => {
    const info = generatedArticles.get(o.source_item_id);
    const status = (info && info.status) || o.article_status;
    return !status || status === 'pending';
  });

  container.innerHTML = `

  `;

  renderAddTopicRow();
  renderUnifiedTables(withoutArticles, withArticles);

async function submitAddTopicModal() {
  const keyword = (document.getElementById('atm-keyword') || {}).value?.trim();
  const category = (document.getElementById('atm-category') || {}).value;
  const language = (document.getElementById('atm-language') || {}).value || 'de';
  const notes = (document.getElementById('atm-notes') || {}).value?.trim();
  const selectedProducts = Array.from(document.querySelectorAll('#atm-products .product-chip.selected'))
    .map(el => el.dataset.product);

  if (!keyword) {
    const inp = document.getElementById('atm-keyword');
    if (inp) inp.style.borderColor = '#dc2626';
    return;
  }

  const submitBtn = document.getElementById('atm-submit');
  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Creating...'; }

  try {
    const resp = await fetch('/api/blog-article', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        keyword: keyword,
        language: language,
        social_context: {
          custom: true,
          category: category,
          products: selectedProducts,
          custom_notes: notes || null,
        },
      }),
    });

    if (!resp.ok) throw new Error('Failed to create topic');

    // Close modal
    const overlay = document.getElementById('add-topic-modal-overlay');
    if (overlay) overlay.remove();

    // Refresh data
    contentPlanningData = null;
    articlesPreloaded = false;
    await Promise.all([loadContentPlanningData(), preloadGeneratedArticles()]);
    renderUnifiedContentView();
  } catch (err) {
    console.error('Failed to add topic:', err);
    alert('Failed to add topic. Please try again.');
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Create Topic'; }
  }
}

async function triggerArticleGeneration(articleId, keyword) {
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = t('generating');
    btn.style.opacity = '0.6';
    try {
        const res = await fetch('/api/blog-article', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ article_id: articleId, keyword: keyword })
        });
        const data = await res.json();
        if (!res.ok || data.error) {
            btn.textContent = t('generate_article');
            btn.disabled = false;
            btn.style.opacity = '1';
            showToast(data.error || t('generation_failed'), 'error');
            return;
        }
        if (data.id || data.status === 'generating') {
            // Poll for completion
            let polls = 0;
            const poll = setInterval(async () => {
                polls++;
                if (polls > 60) { clearInterval(poll); btn.textContent = t('generate_article'); btn.disabled = false; btn.style.opacity = '1'; return; }
                try {
                    const pr = await fetch('/api/blog-article?id=' + (data.id || articleId));
                    const art = await pr.json();
                    if (art.status === 'completed') {
                        clearInterval(poll);
                        showToast(t('article_generated_toast') || 'Article generated!');
                        articleListLoaded = false;
                        renderArticleListView();
                    } else if (art.status === 'failed') {
                        clearInterval(poll);
                        btn.textContent = t('generate_article');
                        btn.disabled = false;
                        btn.style.opacity = '1';
                    }
                } catch(e) { /* continue polling */ }
            }, 5000);
        } else {
            btn.textContent = t('generate_article');
            btn.disabled = false;
            btn.style.opacity = '1';
        }
    } catch (e) {
        console.error('Generation trigger failed:', e);
        btn.textContent = t('generate_article');
        btn.disabled = false;
        btn.style.opacity = '1';
    }
}

async function downloadArticleHtml(articleId, filename) {
    try {
        const res = await fetch('/api/blog-article?id=' + articleId);
        const article = await res.json();
        if (!article || !article.article_html) { alert(t('article_not_found')); return; }

        const parser = new DOMParser();
        const doc = parser.parseFromString(article.article_html, 'text/html');

        // Strip unwanted elements
        doc.querySelectorAll('script, nav, header, footer, .breadcrumb, .category-badge').forEach(el => el.remove());
        // Remove JSON-LD
        doc.querySelectorAll('script[type="application/ld+json"]').forEach(el => el.remove());
        // Remove HTML comments
        const walker = doc.createTreeWalker(doc, NodeFilter.SHOW_COMMENT);
        const comments = [];
        while (walker.nextNode()) comments.push(walker.currentNode);
        comments.forEach(c => c.parentNode.removeChild(c));

        // Keep only style + article
        const styles = Array.from(doc.querySelectorAll('style')).map(s => s.outerHTML).join('\n');
        const articleEl = doc.querySelector('article');
        const content = articleEl ? articleEl.outerHTML : doc.body.innerHTML;

        const cleanHtml = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>' + esc(filename) + '</title>' + styles + '</head><body>' + content + '</body></html>';

        const blob = new Blob([cleanHtml], { type: 'text/html;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const safeName = filename.replace(/[^a-zA-Z0-9äöüÄÖÜß\-_ ]/g, '').replace(/\s+/g, '-').slice(0, 60);
        a.href = url;
        a.download = safeName + '.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    } catch (e) {
        console.error('Download failed:', e);
    }
}

async function handleReviewStatusChange(articleId, newStatus) {
    // Disable all action buttons while updating
    document.querySelectorAll('#review-actions .review-action-btn').forEach(b => b.disabled = true);

    // Show a status indicator next to the review badge
    const statusRow = document.getElementById('review-status-row');
    let statusIndicator = document.getElementById('review-save-indicator');
    if (!statusIndicator && statusRow) {
        statusIndicator = document.createElement('div');
        statusIndicator.id = 'review-save-indicator';
        statusIndicator.style.cssText = 'font-size:12px;padding:6px 10px;border-radius:6px;margin-top:6px;transition:opacity 0.3s;';
        statusRow.appendChild(statusIndicator);
    }

    try {
        const res = await fetch('/api/blog-article', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ article_id: articleId, action: 'review_status', review_status: newStatus }),
        });

        if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            throw new Error(errData.error || 'Save failed');
        }

        const data = await res.json();
        articleListLoaded = false;

        // Update badge and actions in place
        const row = document.getElementById('review-status-row');
        if (row) {
            const badge = row.querySelector('.review-badge');
            if (badge) { badge.className = 'review-badge ' + newStatus; badge.textContent = t('review_' + newStatus); }
            const actions = document.getElementById('review-actions');
            if (actions) actions.innerHTML = buildReviewActions(articleId, newStatus);
        }

        // Show save confirmation
        if (statusIndicator) {
            if (newStatus === 'approved' && data.review_agent_triggered) {
                // Review agent was triggered — show processing indicator
                statusIndicator.style.background = '#fef3c7';
                statusIndicator.style.color = '#92400e';
                statusIndicator.style.border = '1px solid #fde68a';
                statusIndicator.innerHTML = '<span style="display:inline-flex;align-items:center;gap:6px;">'
                    + '<span style="display:inline-block;width:10px;height:10px;border:2px solid #92400e;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;"></span>'
                    + t('review_agent_running') + '</span>';
                statusIndicator.style.opacity = '1';
                // After a delay, show completion (review agent runs async in backend)
                setTimeout(() => {
                    statusIndicator.style.background = '#dcfce7';
                    statusIndicator.style.color = '#166534';
                    statusIndicator.style.border = '1px solid #86efac';
                    statusIndicator.innerHTML = '\u2713 ' + t('review_agent_done');
                    setTimeout(() => { statusIndicator.style.opacity = '0'; }, 5000);
                }, 8000);
            } else if (newStatus === 'approved') {
                // Approved but review agent not available
                statusIndicator.style.background = '#fef3c7';
                statusIndicator.style.color = '#92400e';
                statusIndicator.style.border = '1px solid #fde68a';
                statusIndicator.textContent = t('review_agent_skipped');
                statusIndicator.style.opacity = '1';
                setTimeout(() => { statusIndicator.style.opacity = '0'; }, 5000);
            } else {
                // Normal status change — show saved
                statusIndicator.style.background = '#dcfce7';
                statusIndicator.style.color = '#166534';
                statusIndicator.style.border = '1px solid #86efac';
                statusIndicator.textContent = '\u2713 ' + t('review_status_saved');
                statusIndicator.style.opacity = '1';
                setTimeout(() => { statusIndicator.style.opacity = '0'; }, 3000);
            }
        }

        // Enable/disable publish section based on approval
        const publishFields = document.getElementById('publish-fields');
        if (publishFields) {
            const canPublish = newStatus === 'approved' || newStatus === 'published';
            publishFields.style.opacity = canPublish ? '' : '0.4';
            publishFields.style.pointerEvents = canPublish ? '' : 'none';
            // Remove or add the hint message
            const hint = publishFields.querySelector('[data-publish-hint]');
            if (canPublish && hint) hint.remove();
            if (!canPublish && !hint) {
                const hintEl = document.createElement('div');
                hintEl.setAttribute('data-publish-hint', '1');
                hintEl.style.cssText = 'font-size:11px;color:#9ca3af;margin-bottom:6px;font-style:italic;';
                hintEl.textContent = t('publish_requires_approval');
                publishFields.insertBefore(hintEl, publishFields.firstChild);
            }
        }
        // Re-render article list table to reflect updated status
        renderArticleListView();
    } catch (e) {
        console.error('Failed to update review status:', e);
        if (statusIndicator) {
            statusIndicator.style.background = '#fee2e2';
            statusIndicator.style.color = '#991b1b';
            statusIndicator.style.border = '1px solid #fca5a5';
            statusIndicator.textContent = '\u2717 ' + t('review_status_save_failed');
            statusIndicator.style.opacity = '1';
            setTimeout(() => { statusIndicator.style.opacity = '0'; }, 5000);
        }
        document.querySelectorAll('#review-actions .review-action-btn').forEach(b => b.disabled = false);
    }
}

let _cachedAuthors = null;

async function loadAuthorsForModal(articleId, currentAuthorId) {
    const select = document.getElementById('author-select');
    const currentDiv = document.getElementById('author-current');
    if (!select || !currentDiv) return;

    try {
        if (!_cachedAuthors) {
            const res = await fetch('/api/blog-authors');
            const data = await res.json();
            _cachedAuthors = Array.isArray(data) ? data : (data.authors || []);
        }

        // Build dropdown
        select.innerHTML = '<option value="">' + t('article_select_author') + '</option>'
            + _cachedAuthors.map(a =>
                '<option value="' + a.id + '"' + (a.id === currentAuthorId ? ' selected' : '') + '>'
                + esc(a.name) + (a.title ? ' — ' + esc(a.title) : '') + '</option>'
            ).join('');

        // Show current author card
        const current = _cachedAuthors.find(a => a.id === currentAuthorId);
        if (current) {
            renderAuthorPreview(currentDiv, current);
        } else {
            currentDiv.innerHTML = '<div style="font-size:11px;color:#9ca3af;">' + t('article_no_author') + '</div>';
        }
    } catch (e) {
        console.error('Failed to load authors:', e);
    }
}

function renderAuthorPreview(container, author) {
    let rawCreds = author.credentials || [];
    if (typeof rawCreds === 'string') {
        try { rawCreds = JSON.parse(rawCreds); } catch(_) { rawCreds = rawCreds.split(',').map(s => s.trim()).filter(Boolean); }
    }
    const creds = (Array.isArray(rawCreds) ? rawCreds : []).map(c =>
        '<span style="display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;background:#fff;border:1px solid #e5e7eb;color:#6b7280;margin-right:4px;margin-bottom:3px;">' + esc(c) + '</span>'
    ).join('');
    const imgHtml = author.image_url
        ? '<img src="' + esc(author.image_url) + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">'
        : '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
    container.innerHTML = `
        <div style="display:flex;gap:10px;padding:8px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;">
            <div style="width:44px;height:44px;border-radius:50%;background:#f3f4f6;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;">${imgHtml}</div>
            <div style="flex:1;min-width:0;">
                <div style="font-size:12px;font-weight:600;color:#111;">${esc(author.name)}</div>
                ${author.title ? '<div style="font-size:11px;color:#DD0000;font-weight:500;">' + esc(author.title) + '</div>' : ''}
                ${creds ? '<div style="margin-top:4px;">' + creds + '</div>' : ''}
            </div>
            <button onclick="handleRemoveAuthor()" style="background:none;border:none;cursor:pointer;color:#9ca3af;font-size:16px;line-height:1;padding:0 2px;" title="Remove">&times;</button>
        </div>`;
}

async function handleAuthorSelect(articleId) {
    const select = document.getElementById('author-select');
    const authorId = select.value;
    if (!authorId) return;

    try {
        const assignRes = await fetch('/api/blog-article', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ article_id: articleId, action: 'assign_author', author_id: authorId }),
        });
        if (!assignRes.ok) {
            const err = await assignRes.json().catch(() => ({}));
            throw new Error(err.error || 'Failed to assign author');
        }
        showToast(t('article_author_assigned'));

        // Refresh article HTML (re-render with author card)
        const artRes = await fetch('/api/blog-article?id=' + articleId);
        const artData = await artRes.json();
        const iframe = document.querySelector('#article-modal-overlay iframe');
        if (iframe && artData.article_html) {
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            iframeDoc.open();
            iframeDoc.write(artData.article_html);
            iframeDoc.close();
            setTimeout(() => setupIframeSelection(iframe, articleId), 200);
        }

        // Update preview
        const current = (_cachedAuthors || []).find(a => a.id === authorId);
        const currentDiv = document.getElementById('author-current');

        articleListLoaded = false;
    } catch (e) {
        console.error('Failed to assign author:', e);
        showToast('Fehler: ' + e.message, 'error');
    }
}

async function handleCreateAuthor(articleId) {
    const name = document.getElementById('new-author-name').value.trim();
    if (!name) return;

    const body = {
        name,
        title: document.getElementById('new-author-title').value.trim(),
        bio: document.getElementById('new-author-bio').value.trim(),
        credentials: document.getElementById('new-author-credentials').value.split(',').map(s => s.trim()).filter(Boolean),
        image_url: document.getElementById('new-author-image').value.trim(),
        linkedin_url: document.getElementById('new-author-linkedin').value.trim(),
    };

    try {
        const res = await fetch('/api/blog-authors', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok || data.error) {
            showToast('Fehler: ' + (data.error || 'Autor konnte nicht erstellt werden'), 'error');
            return;
        }
        showToast(t('article_author_created'));

        // Reset form
        document.getElementById('author-create-form').style.display = 'none';
        ['new-author-name','new-author-title','new-author-bio','new-author-credentials','new-author-image','new-author-linkedin'].forEach(id => {
            document.getElementById(id).value = '';
        });

        // Refresh authors cache and auto-assign
        _cachedAuthors = null;
        const newId = data.id;
        if (newId) {
            const assignRes = await fetch('/api/blog-article', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ article_id: articleId, action: 'assign_author', author_id: newId }),
            });
            if (!assignRes.ok) {
                const assignErr = await assignRes.json().catch(() => ({}));
                showToast('Fehler: ' + (assignErr.error || 'Autor konnte nicht zugewiesen werden'), 'error');
            }
            await loadAuthorsForModal(articleId, newId);

            // Refresh article HTML
            const artRes = await fetch('/api/blog-article?id=' + articleId);
            const artData = await artRes.json();
            const iframe = document.querySelector('#article-modal-overlay iframe');
            if (iframe && artData.article_html) {
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                iframeDoc.open();
                iframeDoc.write(artData.article_html);
                iframeDoc.close();
                setTimeout(() => setupIframeSelection(iframe, articleId), 200);
            }
        } else {
            _cachedAuthors = null;
            await loadAuthorsForModal(articleId, null);
        }
    } catch (e) {
        console.error('Failed to create author:', e);
    }
}

let _currentModalArticleId = null;

async function loadArticleComments(articleId) {
    _currentModalArticleId = articleId;

    if (!list) return;

function _commentCardHTML(c) {
    const d = c.created_at ? new Date(c.created_at).toLocaleString(currentLang === 'de' ? 'de-DE' : 'en-US', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
    const authorPart = c.author ? '<span class="comment-author">' + esc(c.author) + '</span>' : '';
    return '<div class="comment-card" data-comment-id="' + esc(c.id) + '"><button class="comment-delete-btn" onclick="handleDeleteComment(\'' + esc(c.id) + '\')" title="' + t('delete_comment') + '">&times;</button><div class="comment-text">' + authorPart + esc(c.comment_text) + '</div><div class="comment-date">' + esc(d) + '</div></div>';
}

function renderCommentsList(comments) {
    const list = document.getElementById('article-comments-list');
    if (!list) return;
    if (comments.length === 0) {
        list.innerHTML = '<div style="padding:16px;text-align:center;color:#9ca3af;font-size:12px;">' + t('article_comments_empty') + '</div>';
        return;
    }
    list.innerHTML = comments.map(c => _commentCardHTML(c)).join('');
}

async function handleAddComment(articleId) {
    const textarea = document.getElementById('comment-textarea');
    const authorInput = document.getElementById('comment-author-input');
    const btn = document.getElementById('btn-add-comment');
    if (!textarea || !textarea.value.trim()) return;

    const author = authorInput ? authorInput.value.trim() : '';
    if (!author) {
        authorInput.style.borderColor = '#ef4444';
        authorInput.focus();
        return;
    }
    authorInput.style.borderColor = '';
    const text = textarea.value.trim();

    // Disable button to prevent double-submit
    if (btn) btn.disabled = true;

    try {
        const res = await fetch('/api/blog-article', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ article_id: articleId, action: 'add_comment', author: author, comment_text: text }),
        });
        const newComment = await res.json();
        if (!res.ok || newComment.error) {
            alert('Kommentar konnte nicht gespeichert werden: ' + (newComment.error || 'Unbekannter Fehler'));
            return;
        }
        const list = document.getElementById('article-comments-list');
        if (list) {
            const emptyMsg = list.querySelector('div[style*="text-align:center"]');
            if (emptyMsg && list.children.length === 1) list.innerHTML = '';
            list.innerHTML += _commentCardHTML(newComment);
            list.scrollTop = list.scrollHeight;
        }
        textarea.value = '';
        if (authorInput) authorInput.selectedIndex = 0;
    } catch (e) {
        console.error('Failed to add comment:', e);
        alert('Kommentar konnte nicht gespeichert werden.');
    } finally {
        if (btn) btn.disabled = false;
    }
}

async function handleDeleteComment(commentId) {
    if (!_currentModalArticleId) return;
    const card = document.querySelector('.comment-card[data-comment-id="' + commentId + '"]');
    if (card) card.style.opacity = '0.4';
    try {
        const res = await fetch('/api/blog-article', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ article_id: _currentModalArticleId, action: 'delete_comment', comment_id: commentId }),
        });
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || 'Failed to delete');
        }
        if (card) card.remove();
        const list = document.getElementById('article-comments-list');
        if (list && list.children.length === 0) {
            list.innerHTML = '<div style="padding:16px;text-align:center;color:#9ca3af;font-size:12px;">' + t('article_comments_empty') + '</div>';
        }
    } catch (e) {
        console.error('Failed to delete comment:', e);
        if (card) card.style.opacity = '1';
        showToast('Kommentar konnte nicht gelöscht werden', 'error');
    }
}


/* ── Q&A THREADS TAB ── */
function renderQATab() {
    const ji = DASHBOARD_DATA.journey_intelligence || {};
    const threads = ji.qa_threads || [];
    const bridgeSummary = ji.bridge_summary || { total_detected: 0, patterns: [] };
    let html = '';

    if (threads.length === 0) {
        html = `<div class="section"><div class="section-header"><div>
            <div class="section-title">${t('tab_qa')}</div>
            <div class="section-subtitle">${t('qa_no_threads')}</div>
        </div></div></div>`;
        document.getElementById('tab-qa').innerHTML = html;
        return;
    }

    // Collect unique categories for filter chips
    const cats = [...new Set(threads.map(th => th.category).filter(Boolean))];

    // Build source filters: count per source, group sources with <3 posts into "other"
    const sourceCounts = {};
    threads.forEach(th => {
        const src = th.source || '';
        if (src) sourceCounts[src] = (sourceCounts[src] || 0) + 1;
    });
    const majorSources = [];
    let otherSourceCount = 0;
    const otherSourceNames = [];
    Object.entries(sourceCounts).sort((a, b) => b[1] - a[1]).forEach(([src, cnt]) => {
        if (cnt >= 3) {
            majorSources.push({ name: src, count: cnt });
        } else {
            otherSourceCount += cnt;
            otherSourceNames.push(src);
        }
    });

    const subtitleText = t('qa_subtitle').replace('{count}', threads.length);
    html += `<div class="section">
        <div class="section-header"><div>
            <div class="section-title">${t('tab_qa')} ${infoTip('tooltip_qa_threads')}</div>
            <div class="section-subtitle">${esc(subtitleText)}</div>
        </div></div>`;

    // Bridge summary bar
    if (bridgeSummary.total_detected > 0) {
        const bsText = t('qa_bridge_summary').replace('{count}', bridgeSummary.total_detected);
        html += `<div class="bridge-summary-bar">
            <span class="bridge-total">${esc(bsText)} ${infoTip('tooltip_bridge_section')}</span>
            ${bridgeSummary.patterns.slice(0, 4).map(p => {
                const label = currentLang === 'en' ? p.label_en : p.label_de;
                return `<span class="bridge-pill">${esc(label)} (${p.count})</span>`;
            }).join('')}
        </div>`;
    }

    // Filter chips: category + source + bridge
    html += `<div class="qa-filter-chips" id="qaFilterChips">
            <span class="qa-chip active" data-filter="reset">${t('qa_all')}</span>${infoTip('tooltip_qa_filters')}
            ${cats.map(c => `<span class="qa-chip" data-filter="cat" data-val="${esc(c)}">${catLabel(c)}</span>`).join('')}
            <span class="qa-filter-separator"></span>
            ${majorSources.map(s => `<span class="qa-chip" data-filter="source" data-val="${esc(s.name)}">${esc(s.name)} (${s.count})</span>`).join('')}
            ${otherSourceCount > 0 ? `<span class="qa-chip" data-filter="source" data-val="__other__">${t('qa_source_other')} (${otherSourceCount})</span>` : ''}
            <span class="qa-filter-separator"></span>
            <span class="qa-chip bridge-chip" data-filter="bridge" data-val="all_bridges">${t('qa_bridge_only')}</span>
            ${bridgeSummary.patterns.slice(0, 4).map(p => {
                const label = currentLang === 'en' ? p.label_en : p.label_de;
                return `<span class="qa-chip bridge-chip" data-filter="bridge" data-val="${esc(p.bridge_type)}">${esc(label)}</span>`;
            }).join('')}
        </div>
        <div id="qaThreadList"></div>
        <button class="qa-show-more-btn" id="qaShowMore" style="display:none">${t('qa_show_more')}</button>
    </div>`;

    document.getElementById('tab-qa').innerHTML = html;

    // State
    let activeFilterType = 'none';   // 'none' | 'cat' | 'source' | 'bridge'
    let activeFilterVal = '';
    let visibleCount = 10;

    // Other source names for "__other__" filter
    const _otherSrcSet = new Set(otherSourceNames);

    function renderThreads() {
        let filtered = threads;

        // Apply global source filter first
        if (window.__activeSource !== 'all') {
            filtered = filtered.filter(th => (th.source || '') === window.__activeSource);
        }

        if (activeFilterType === 'cat') {
            filtered = filtered.filter(th => th.category === activeFilterVal);
        } else if (activeFilterType === 'source') {
            if (activeFilterVal === '__other__') {
                filtered = filtered.filter(th => _otherSrcSet.has(th.source || ''));
            } else {
                filtered = filtered.filter(th => (th.source || '') === activeFilterVal);
            }
        } else if (activeFilterType === 'bridge') {
            if (activeFilterVal === 'all_bridges') {
                filtered = filtered.filter(th => (th.bridge_types || []).length > 0);
            } else {
                filtered = filtered.filter(th => (th.bridge_types || []).includes(activeFilterVal));
            }
        }

        const showing = filtered.slice(0, visibleCount);
        const container = document.getElementById('qaThreadList');
        if (!container) return;

        container.innerHTML = showing.map((th, idx) => {
            const answersHtml = (th.answers || []).map(a => `<div class="qa-answer-card">
                <div class="qa-answer-header">
                    <span style="font-size:12px;font-weight:500;color:var(--gray-700);">${a.author ? esc(a.author) : ''}</span>
                    <span>
                        ${a.is_accepted ? `<span class="qa-accepted">${t('qa_accepted')}</span>` : ''}
                        ${a.votes ? `<span class="qa-votes-badge">\u2191${a.votes} ${t('qa_votes')}</span>` : ''}
                    </span>
                </div>
                <div style="font-size:13px;color:var(--gray-600);line-height:1.5;">${esc(a.content)}</div>
            </div>`).join('');

            const analysisHtml = th.analysis ? `<div class="qa-analysis-box">
                <div class="qa-analysis-label">${t('qa_analysis_label')}</div>
                <div class="qa-analysis-text">${esc(th.analysis)}</div>
            </div>
            ${th.action ? `<div class="qa-action-box">
                <div class="qa-action-label">${t('qa_action_label')}</div>
                <div class="qa-analysis-text">${esc(th.action)}</div>
            </div>` : ''}` : '';

            const entityPills = (th.entities || []).filter(Boolean).map(e =>
                `<span class="qa-source-badge" style="background:var(--beurer-magenta-light);color:var(--beurer-magenta);">${esc(e)}</span>`
            ).join('');

            const bridgePills = (th.bridge_types || []).map(bt => {
                const pat = bridgeSummary.patterns.find(p => p.bridge_type === bt);
                const label = pat ? (currentLang === 'en' ? pat.label_en : pat.label_de) : bt;
                return `<span class="bridge-badge">${esc(label)}</span>`;
            }).join('');

            return `<div class="qa-card" data-qa-idx="${idx}" onclick="toggleQACard(this)">
                <div class="qa-question-title">${th.url ? `<a href="${esc(th.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation();" style="color:inherit;text-decoration:none;">${esc(th.question)}&nbsp;<span style="color:var(--beurer-magenta);font-size:12px;">&#8599;</span></a>` : esc(th.question)}</div>
                <div class="qa-meta-row">
                    <span class="qa-source-badge">${esc(th.source)}</span>
                    <span class="qa-source-badge">${catLabel(th.category)}</span>
                    ${th.journey_stage ? `<span class="qa-source-badge">${stageLabel(th.journey_stage)}</span>` : ''}
                    <span class="qa-source-badge">${th.answer_count} ${t('qa_answers')}</span>
                    ${entityPills}
                    ${bridgePills}
                    ${th.posted_at ? `<span style="font-size:11px;color:var(--gray-400);">${th.posted_at}</span>` : ''}
                </div>
                <div class="qa-answers-section" style="display:none;">
                    ${answersHtml}
                    ${analysisHtml}
                    ${th.url ? `<a href="${esc(th.url)}" target="_blank" rel="noopener" style="display:inline-block;margin-top:10px;font-size:12px;color:var(--beurer-magenta);text-decoration:none;">${t('qa_source')} \u2192</a>` : ''}
                </div>
            </div>`;
        }).join('');

        const moreBtn = document.getElementById('qaShowMore');
        if (moreBtn) moreBtn.style.display = filtered.length > visibleCount ? 'block' : 'none';
    }

    // Unified filter chip handler
    document.querySelectorAll('#qaFilterChips .qa-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            const fType = chip.dataset.filter;
            const fVal = chip.dataset.val || '';

            if (fType === 'reset') {
                activeFilterType = 'none';
                activeFilterVal = '';
            } else {
                activeFilterType = fType;
                activeFilterVal = fVal;
            }

            document.querySelectorAll('#qaFilterChips .qa-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            visibleCount = 10;
            renderThreads();
        });
    });

    // Show more button
    const showMoreBtn = document.getElementById('qaShowMore');
    if (showMoreBtn) {
        showMoreBtn.addEventListener('click', () => {
            visibleCount += 10;
            renderThreads();
        });
    }

    renderThreads();
}

function toggleQACard(card) {
    const section = card.querySelector('.qa-answers-section');
    if (!section) return;
    const isExpanded = card.classList.contains('expanded');
    if (isExpanded) {
        card.classList.remove('expanded');
        section.style.display = 'none';
    } else {
        card.classList.add('expanded');
        section.style.display = 'block';
    }
}


/* ── NEWS TAB ── */
function renderNewsTab() {
    const d = DASHBOARD_DATA;
    const news = d.news || { articles: [], total: 0 };
    const articles = news.articles || [];

    const tierColors = { must_read: '#FF3B30', interesting: '#FF9500', worth_reading: '#8E8E93' };
    const tierLabels = { must_read: 'news_must_read', interesting: 'news_interesting', worth_reading: 'news_worth_reading' };
    const catColors = { all: '#DD0000', curated: '#10B981', industry: '#007AFF', company: '#34C759', competitor: '#AF52DE' };
    const catLabelsMap = {
        all: currentLang === 'de' ? 'Alle' : 'All',
        curated: currentLang === 'de' ? 'Kuratiert' : 'Curated',
        industry: currentLang === 'de' ? 'Branche' : 'Industry',
        company: currentLang === 'de' ? 'Unternehmen' : 'Company',
        competitor: currentLang === 'de' ? 'Wettbewerber' : 'Competitor'
    };

    function buildCards(list) {
        return list.map(a => {
            const cat = a.news_category || 'industry';
            const isCurated = cat === 'curated';
            const curatedBadge = isCurated
                ? `<span style="background:#10B981;color:#fff;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600;">${catLabelsMap.curated}${a.submitted_by ? ' \u2014 ' + esc(a.submitted_by) : ''}</span>`
                : '';
            const catBadge = !isCurated
                ? `<span style="background:${catColors[cat] || '#007AFF'};color:#fff;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:500;">${catLabelsMap[cat] || cat}</span>`
                : '';
            return `
            <div class="news-card" data-tier="${a.tier}" data-category="${cat}" data-competitor="${a.is_competitor ? 'true' : 'false'}"
                 ${isCurated ? 'style="border-left:3px solid #10B981;"' : ''}>
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
                    <span style="background:${tierColors[a.tier]};color:#fff;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600;">${esc(t(tierLabels[a.tier]))}</span>
                    ${curatedBadge}${catBadge}
                    <span style="color:var(--text-secondary);font-size:12px;">${esc(a.source)}</span>
                    ${a.author ? '<span style="color:var(--text-tertiary);font-size:12px;">\u2014 ' + esc(a.author) + '</span>' : ''}
                </div>
                <a href="${esc(a.url)}" target="_blank" rel="noopener" style="font-weight:600;font-size:15px;color:var(--text-primary);text-decoration:none;display:block;margin-bottom:6px;line-height:1.4;">
                    ${esc(a.title)}
                </a>
                <div style="color:var(--text-secondary);font-size:13px;line-height:1.5;margin-bottom:8px;">
                    ${esc(a.summary || '')}
                </div>
                <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                    ${(a.topic_tags||[]).map(tag => '<span style="background:var(--bg-tertiary);padding:2px 8px;border-radius:8px;font-size:11px;color:var(--text-secondary);">' + esc(tag) + '</span>').join('')}
                    ${a.posted_at ? '<span style="margin-left:auto;color:var(--text-tertiary);font-size:12px;">' + formatDate(a.posted_at) + '</span>' : ''}
                </div>
            </div>`;
        }).join('');
    }

    const curatedCount = articles.filter(a => (a.news_category||'industry') === 'curated').length;
    const industryCount = articles.filter(a => (a.news_category||'industry') === 'industry').length;
    const companyCount = articles.filter(a => (a.news_category||'industry') === 'company').length;
    const competitorCount = articles.filter(a => (a.news_category||'industry') === 'competitor').length;

    let html = `<div class="content-area"><div class="content-section"><div class="section-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
        <div>
            <div class="section-title">${t('tab_news')}</div>
            <div class="section-subtitle">${articles.length} ${currentLang === 'de' ? 'Artikel gefunden' : 'articles found'}</div>
        </div>
        <button id="newsSubmitBtn" type="button" style="display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);cursor:pointer;font-size:13px;font-weight:500;transition:all 0.2s;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            ${currentLang === 'de' ? 'Link einreichen' : 'Submit Link'}
        </button>
    </div>

    <!-- Submit link form (hidden by default) -->
    <div id="newsSubmitForm" style="display:none;background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px;">
        <div style="font-weight:600;font-size:14px;margin-bottom:12px;">${currentLang === 'de' ? 'Artikel-Link einreichen' : 'Submit an Article Link'}</div>
        <div style="display:flex;gap:8px;align-items:center;">
            <input id="newsUrlInput" type="url" placeholder="${currentLang === 'de' ? 'URL einfügen...' : 'Paste URL...'}"
                style="flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;background:var(--bg-primary);color:var(--text-primary);" />
            <button id="newsUrlSubmit" type="button" style="padding:10px 20px;border-radius:8px;border:none;background:#10B981;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;">
                ${currentLang === 'de' ? 'Analysieren' : 'Analyze'}
            </button>
        </div>
        <div id="newsSubmitStatus" style="margin-top:10px;font-size:13px;display:none;"></div>
    </div>

    <div id="newsFilterBar" style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;">
        <button class="news-filter-chip active" data-filter="all" style="padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:#DD0000;color:#fff;cursor:pointer;font-size:13px;font-weight:500;">${catLabelsMap.all} (${articles.length})</button>
        <button class="news-filter-chip" data-filter="curated" style="padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);cursor:pointer;font-size:13px;font-weight:500;">${catLabelsMap.curated} (${curatedCount})</button>
        <button class="news-filter-chip" data-filter="industry" style="padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);cursor:pointer;font-size:13px;font-weight:500;">${catLabelsMap.industry} (${industryCount})</button>
        <button class="news-filter-chip" data-filter="company" style="padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);cursor:pointer;font-size:13px;font-weight:500;">${catLabelsMap.company} (${companyCount})</button>
        <button class="news-filter-chip" data-filter="competitor" style="padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);cursor:pointer;font-size:13px;font-weight:500;">${catLabelsMap.competitor} (${competitorCount})</button>
    </div>
    <div id="newsEmptyMsg" style="display:none;text-align:center;padding:40px 20px;color:var(--text-secondary);">
        <div style="font-size:15px;font-weight:600;margin-bottom:8px;">${currentLang === 'de' ? 'Keine Artikel in dieser Kategorie' : 'No articles in this category'}</div>
    </div>
    <div id="newsCardsContainer" style="display:flex;flex-direction:column;gap:12px;">
        ${buildCards(articles)}
    </div></div></div>`;

    document.getElementById('tab-news').innerHTML = html;

    // Submit link toggle
    const submitBtn = document.getElementById('newsSubmitBtn');
    const submitForm = document.getElementById('newsSubmitForm');
    if (submitBtn && submitForm) {
        submitBtn.addEventListener('click', () => {
            submitForm.style.display = submitForm.style.display === 'none' ? '' : 'none';
            if (submitForm.style.display !== 'none') {
                document.getElementById('newsUrlInput').focus();
            }
        });
    }

    // Submit link handler
    const urlSubmitBtn = document.getElementById('newsUrlSubmit');
    if (urlSubmitBtn) {
        urlSubmitBtn.addEventListener('click', async () => {
            const input = document.getElementById('newsUrlInput');
            const status = document.getElementById('newsSubmitStatus');
            const url = input.value.trim();
            if (!url) return;

            status.style.display = '';
            status.style.color = 'var(--text-secondary)';
            status.textContent = currentLang === 'de' ? 'Wird analysiert...' : 'Analyzing...';
            urlSubmitBtn.disabled = true;
            urlSubmitBtn.style.opacity = '0.6';

            try {
                const res = await fetch('/api/news/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, submitted_by: 'Team' })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    status.style.color = '#10B981';
                    status.textContent = (currentLang === 'de' ? 'Erfolgreich hinzugefügt: ' : 'Added: ') + (data.article?.title || url);
                    input.value = '';
                    // Reload page after 2s to show the new article
                    setTimeout(() => window.location.reload(), 2000);
                } else {
                    status.style.color = '#FF3B30';
                    status.textContent = (currentLang === 'de' ? 'Fehler: ' : 'Error: ') + (data.error || 'Unknown');
                }
            } catch (e) {
                status.style.color = '#FF3B30';
                status.textContent = (currentLang === 'de' ? 'Netzwerkfehler' : 'Network error');
            }
            urlSubmitBtn.disabled = false;
            urlSubmitBtn.style.opacity = '1';
        });

        // Submit on Enter key
        document.getElementById('newsUrlInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') urlSubmitBtn.click();
        });
    }

    // Category filter logic
    let activeFilter = 'all';
    const chips = document.querySelectorAll('#newsFilterBar .news-filter-chip');
    chips.forEach(chip => {
        chip.addEventListener('click', function() {
            chips.forEach(c => {
                c.classList.remove('active');
                c.style.background = 'var(--bg-secondary)';
                c.style.color = 'var(--text-primary)';
            });
            this.classList.add('active');
            activeFilter = this.dataset.filter;
            this.style.background = catColors[activeFilter] || 'var(--brand-primary)';
            this.style.color = '#fff';

            const cards = document.querySelectorAll('#newsCardsContainer .news-card');
            const emptyEl = document.getElementById('newsEmptyMsg');
            let visible = 0;
            cards.forEach(card => {
                const cat = card.dataset.category || 'industry';
                const show = activeFilter === 'all' || cat === activeFilter;
                card.style.display = show ? '' : 'none';
                if (show) visible++;
            });
            if (emptyEl) emptyEl.style.display = visible === 0 ? '' : 'none';
        });
    });
}

            </div>
            <div>${t('gsc_loading')}</div>
        </div>
    </div>`;

    // Fetch GSC data from API
    fetch('/api/gsc/data?days=28')

        .catch(() => {
            renderGscNotConnected(panel);
        });
}

            <div style="font-size:28px;font-weight:700;color:var(--gray-900);margin-top:4px">${totals.impressions ? (totals.clicks / totals.impressions * 100).toFixed(1) + '%' : '—'}</div>

        <div class="metric-card" style="padding:20px">

async function handleKdCsvUpload(input) {
    const file = input.files?.[0];
    if (!file) return;
    input.value = '';

    const label = input.parentElement;
    const origText = label.textContent.trim();
    label.textContent = '\u23F3 Uploading...';
    label.style.pointerEvents = 'none';

    try {
        const form = new FormData();
        form.append('file', file);
        const res = await fetch('/api/kundendienst', { method: 'POST', body: form });
        const data = await res.json();

        if (!res.ok || data.error) throw new Error(data.error || 'Upload failed');

        showToast(`Import: ${data.imported} imported, ${data.skipped} skipped`);
        setTimeout(() => location.reload(), 1500);
    } catch (err) {
        showToast('Upload failed: ' + err.message, 'error');
    } finally {
        label.innerHTML = `${origText}<input type="file" accept=".csv,.xls,.xlsx" style="display:none;" onchange="handleKdCsvUpload(this)">`;
        label.style.pointerEvents = '';
    }
}

function _renderKdHeatmap(heatmap, catFilter) {
    const table = document.getElementById('kdHeatmapTable');
    if (!table) return;

    const reasons = heatmap.allReasons || [];
    let products = heatmap.products || [];

    // Filter by category
    if (catFilter && catFilter !== 'all') {
        products = products.filter(p => (p.category || '').toLowerCase() === catFilter.toLowerCase());
    }

    // Sort by total descending
    products = [...products].sort((a, b) => (b.total || 0) - (a.total || 0));

    if (products.length === 0 || reasons.length === 0) {
        table.innerHTML = `<tr><td style="padding:40px;text-align:center;color:var(--gray-500)">${t('kd_no_data')}</td></tr>`;
        return;
    }

    // Find max count for color scaling
    let maxCount = 0;
    products.forEach(p => {
        reasons.forEach(r => {
            const v = (p.reasons || {})[r] || 0;
            if (v > maxCount) maxCount = v;
        });
    });

    let headerHtml = `<thead><tr style="border-bottom:2px solid var(--gray-200)">
        <th style="text-align:left;padding:10px 12px;font-weight:600;color:var(--gray-700);white-space:nowrap;position:sticky;left:0;background:var(--pure-white);z-index:1">${t('kd_product')}</th>`;
    reasons.forEach(r => {
        headerHtml += `<th style="text-align:center;padding:10px 8px;font-weight:500;color:var(--gray-500);font-size:12px;white-space:nowrap;cursor:pointer" data-sort-reason="${r}" title="${esc(titleCase(r))}">${esc(titleCase(r))}</th>`;
    });
    headerHtml += `<th style="text-align:center;padding:10px 12px;font-weight:600;color:var(--gray-700)">${t('kd_total')}</th></tr></thead>`;

    let bodyHtml = '<tbody>';
    products.forEach(p => {
        bodyHtml += `<tr style="border-bottom:1px solid var(--gray-100)">
            <td style="padding:10px 12px;font-weight:500;white-space:nowrap;position:sticky;left:0;background:var(--pure-white);z-index:1">${esc(p.model)}</td>`;
        reasons.forEach(r => {
            const v = (p.reasons || {})[r] || 0;
            const intensity = maxCount > 0 ? v / maxCount : 0;
            const bg = v > 0 ? `rgba(198, 0, 80, ${0.08 + intensity * 0.52})` : 'transparent';
            const textColor = intensity > 0.5 ? '#fff' : 'var(--gray-700)';
            bodyHtml += `<td style="text-align:center;padding:10px 8px;background:${bg};color:${v > 0 ? textColor : 'var(--gray-400)'};font-weight:${v > 0 ? '600' : '400'};font-size:13px;transition:background 0.2s">${v > 0 ? v : '\u2014'}</td>`;
        });
        bodyHtml += `<td style="text-align:center;padding:10px 12px;font-weight:700;color:var(--gray-900)">${(p.total || 0)}</td></tr>`;
    });
    bodyHtml += '</tbody>';

    table.innerHTML = headerHtml + bodyHtml;

    // Sortable columns
    table.querySelectorAll('th[data-sort-reason]').forEach(th => {
        th.addEventListener('click', () => {
            const reason = th.dataset.sortReason;
            const rows = Array.from(table.querySelectorAll('tbody tr'));
            const asc = th.dataset.sortDir === 'asc';
            th.dataset.sortDir = asc ? 'desc' : 'asc';
            rows.sort((a, b) => {
                const aIdx = Array.from(a.children);
                const bIdx = Array.from(b.children);
                const colIdx = Array.from(th.parentElement.children).indexOf(th);
                const aVal = parseInt(aIdx[colIdx]?.textContent) || 0;
                const bVal = parseInt(bIdx[colIdx]?.textContent) || 0;
                return asc ? aVal - bVal : bVal - aVal;
            });
            const tbody = table.querySelector('tbody');
            rows.forEach(r => tbody.appendChild(r));
        });
    });
}

function _initKdTrendChart(trends, colors, productFilter) {
    if (typeof Chart === 'undefined') return;
    const canvas = document.getElementById('kdTrendChart');
    if (!canvas) return;

    const weeks = trends.weeks || [];
    const reasons = trends.allReasons || [];
    const labels = weeks.map(w => w.week || '');

    const datasets = reasons.map((reason, i) => ({
        label: titleCase(reason),
        data: weeks.map(w => (w.byReason || {})[reason] || 0),
        borderColor: colors[i % colors.length],
        backgroundColor: colors[i % colors.length] + '20',
        borderWidth: 2,
        pointRadius: 3,
        tension: 0.3,
        fill: false
    }));

    // Also add total line
    datasets.unshift({
        label: t('kd_total'),
        data: weeks.map(w => w.total || 0),
        borderColor: '#1D1D1F',
        backgroundColor: 'rgba(29,29,31,0.1)',
        borderWidth: 2.5,
        pointRadius: 4,
        tension: 0.3,
        fill: false,
        borderDash: [5, 3]
    });

    new Chart(canvas, {
        type: 'line',
        data: { labels, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { intersect: false, mode: 'index' },
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: { usePointStyle: true, padding: 16, font: { size: 12 } }
                },
                tooltip: {
                    backgroundColor: 'rgba(0,0,0,0.8)',
                    titleFont: { size: 13 },
                    bodyFont: { size: 12 },
                    padding: 12,
                    cornerRadius: 8
                }
            },
            scales: {
                x: {
                    grid: { display: false },
                    ticks: { font: { size: 11 }, color: '#86868B' }
                },
                y: {
                    beginAtZero: true,
                    grid: { color: 'rgba(0,0,0,0.04)' },
                    ticks: { font: { size: 11 }, color: '#86868B' }
                }
            }
        }
    });
}

function _renderKdAlerts(alerts) {
    const container = document.getElementById('kdAlertsList');
    if (!container) return;

    if (!alerts || alerts.length === 0) {
        container.innerHTML = `<div style="text-align:center;padding:48px 0;color:var(--gray-500)">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:12px;opacity:0.4"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            <div>${t('kd_no_data')}</div>
        </div>`;
        return;
    }

    const sorted = [...alerts].sort((a, b) => {
        if (a.severity === 'critical' && b.severity !== 'critical') return -1;
        if (b.severity === 'critical' && a.severity !== 'critical') return 1;
        return (b.changePercent || 0) - (a.changePercent || 0);
    });

    container.innerHTML = sorted.map(a => {
        const isCritical = a.severity === 'critical';
        const borderColor = isCritical ? 'var(--error)' : 'var(--warning)';
        const severityLabel = isCritical ? t('kd_severity_critical') : t('kd_severity_warning');
        const severityBg = isCritical ? 'var(--error-light)' : 'var(--warning-light)';
        const severityColor = isCritical ? 'var(--error)' : 'var(--warning)';
        const changeSign = (a.changePercent || 0) > 0 ? '+' : '';

        return `<div class="card" style="border-left:3px solid ${borderColor};margin-bottom:12px">
            <div style="padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
                <div style="flex:1;min-width:200px">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
                        <span style="font-weight:600;font-size:15px;color:var(--gray-900)">${esc(a.product)}</span>
                        <span style="background:${severityBg};color:${severityColor};padding:2px 10px;border-radius:99px;font-size:11px;font-weight:600">${severityLabel}</span>
                    </div>
                    <div style="color:var(--gray-600);font-size:13px">${esc(titleCase(a.reason))}</div>
                </div>
                <div style="display:flex;gap:24px;align-items:center">
                    <div style="text-align:center">
                        <div style="font-size:11px;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.5px">${t('kd_cases')}</div>
                        <div style="font-size:22px;font-weight:700;color:var(--gray-900)">${a.currentCount || 0}</div>
                    </div>
                    <div style="text-align:center">
                        <div style="font-size:11px;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.5px">${t('kd_avg')}</div>
                        <div style="font-size:22px;font-weight:700;color:var(--gray-500)">${a.avgCount != null ? a.avgCount.toFixed(1) : '\u2014'}</div>
                    </div>
                    <div style="text-align:center">
                        <div style="font-size:11px;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.5px">${t('kd_change')}</div>
                        <div style="font-size:22px;font-weight:700;color:${(a.changePercent || 0) > 0 ? 'var(--error)' : 'var(--success)'}">${changeSign}${(a.changePercent || 0)}%</div>
                    </div>
                </div>
            </div>
        </div>`;
    }).join('');
}

                const severityColor = isCritical ? 'var(--error)' : 'var(--warning)';

                const changeSign = (a.changePercent || 0) > 0 ? '+' : '';

function initCharts() {
    if (typeof Chart === 'undefined') {
        document.querySelectorAll('canvas').forEach(c => {
            c.parentElement.innerHTML = `<div class="no-chartjs">${t('chartjs_unavailable')}</div>`;
        });
        return;
    }

    Chart.defaults.font.family = "'DM Sans', -apple-system, sans-serif";
    Chart.defaults.font.size = 12;
    Chart.defaults.color = CHART_COLORS.gray500;
    Chart.defaults.plugins.legend.labels.usePointStyle = true;
    Chart.defaults.plugins.legend.labels.pointStyle = 'circle';
    Chart.defaults.plugins.legend.labels.padding = 16;
    Chart.defaults.scale.grid = { display: false };
    Chart.defaults.scale.border = { display: false };
    Chart.defaults.plugins.tooltip.cornerRadius = 8;
    Chart.defaults.plugins.tooltip.padding = 10;
    Chart.defaults.plugins.tooltip.titleFont = { weight: '600' };

    initSourcesChart();
    initSentimentChart();

    // Insights charts use per-category data

function _destroyChartById(id) {
    const idx = chartInstances.findIndex(c => c.canvas && c.canvas.id === id);
    if (idx !== -1) { try { chartInstances[idx].destroy(); } catch(e) {} chartInstances.splice(idx, 1); }
}

function initSourcesChart() {
    const el = document.getElementById('sourcesChart');
    if (!el) return;
    _destroyChartById('sourcesChart');

    const drillCat = window.__sourceChartDrillCategory;

    if (drillCat) {
        // ── DRILL-DOWN VIEW: individual sources within a category ──
        const grouped = buildSourcesByCategory();
        const catSources = grouped[drillCat] || {};
        const entries = Object.entries(catSources).sort((a, b) => b[1] - a[1]);
        // Magenta gradient: decreasing opacity
        const colors = entries.map((_, i) => {
            const opacity = Math.max(0.25, 1 - (i * 0.12));
            return `rgba(198, 0, 80, ${opacity})`;
        });
        // Highlight active source
        const borderWidths = entries.map(e => e[0] === window.__activeSource ? 3 : 0);
        const borderColors = entries.map(e => e[0] === window.__activeSource ? '#1D1D1F' : 'transparent');

        const chart = new Chart(el, {
            type: 'doughnut',
            data: {
                labels: entries.map(e => `${e[0]} (${e[1]})`),
                datasets: [{
                    data: entries.map(e => e[1]),
                    backgroundColor: colors,
                    borderWidth: borderWidths,
                    borderColor: borderColors,
                    hoverOffset: 6
                }]
            },
            options: {
                ...CHART_PRESET.doughnut,
                onHover: (evt, elements) => { evt.native.target.style.cursor = elements.length ? 'pointer' : 'default'; },
                onClick: (evt, elements) => {
                    if (!elements.length) return;
                    const idx = elements[0].index;
                    const sourceName = entries[idx][0];
                    // Toggle: click same source again → clear filter
                    if (window.__activeSource === sourceName) {
                        window.__activeSource = 'all';
                    } else {
                        window.__activeSource = sourceName;
                    }
                    updateSourceChartHeader();
                    initSourcesChart();
                    applyGlobalCategoryFilter();
                }
            }
        });
        chartInstances.push(chart);
    } else {
        // ── CATEGORY VIEW (default): source categories ──
        let sources;
        if (activeOverviewCat !== 'all' && DASHBOARD_DATA.volume_by_source_by_category) {
            sources = DASHBOARD_DATA.volume_by_source_by_category[activeOverviewCat] || {};
        } else {
            sources = DASHBOARD_DATA.volume_by_source_category || DASHBOARD_DATA.volume_by_source || {};
        }
        const entries = Object.entries(sources).sort((a, b) => b[1] - a[1]);
        const colors = [CHART_COLORS.magenta, CHART_COLORS.gold, CHART_COLORS.info, CHART_COLORS.success, CHART_COLORS.gray300, CHART_COLORS.warning, CHART_COLORS.error];

        const chart = new Chart(el, {
            type: 'doughnut',
            data: {
                labels: entries.map(e => `${e[0]} (${e[1]})`),
                datasets: [{ data: entries.map(e => e[1]), backgroundColor: colors.slice(0, entries.length), borderWidth: 0, hoverOffset: 6 }]
            },
            options: {
                ...CHART_PRESET.doughnut,
                onHover: (evt, elements) => { evt.native.target.style.cursor = elements.length ? 'pointer' : 'default'; },
                onClick: (evt, elements) => {
                    if (!elements.length) return;
                    const idx = elements[0].index;
                    const categoryName = entries[idx][0];
                    window.__sourceChartDrillCategory = categoryName;
                    updateSourceChartHeader();
                    initSourcesChart();
                }
            }
        });
        chartInstances.push(chart);
    }
    updateSourceChartHeader();
}

/* ── Source chart header/breadcrumb helpers ── */
function updateSourceChartHeader() {
    const headerEl = document.getElementById('sourcesChartHeader');
    const subtitleEl = document.getElementById('sourcesChartSubtitle');
    const footnoteEl = document.getElementById('sourcesChartFootnote');
    if (!headerEl || !subtitleEl) return;

    const drillCat = window.__sourceChartDrillCategory;
    if (drillCat) {
        const grouped = buildSourcesByCategory();
        const catSources = grouped[drillCat] || {};
        const srcCount = Object.keys(catSources).length;
        headerEl.innerHTML = `<span class="source-breadcrumb"><a href="javascript:void(0)" onclick="sourceChartBack()">${t('back_to_categories')}</a> › ${esc(drillCat)}</span>`;
        let sub = `${srcCount} ${t('sources_in_category')} ${esc(drillCat)}`;
        if (window.__activeSource !== 'all') {
            sub += ` &nbsp;<span class="source-filter-indicator">&#9679; ${t('source_filter_active')}: ${esc(window.__activeSource)} — <a href="javascript:void(0)" onclick="clearSourceFilter()">${t('source_filter_clear')}</a></span>`;
        }
        subtitleEl.innerHTML = sub;
        if (footnoteEl) footnoteEl.innerHTML = '';
    } else {
        // Restore default header
        let sources;
        if (activeOverviewCat !== 'all' && DASHBOARD_DATA.volume_by_source_by_category) {
            sources = DASHBOARD_DATA.volume_by_source_by_category[activeOverviewCat] || {};
        } else {
            sources = DASHBOARD_DATA.volume_by_source_category || DASHBOARD_DATA.volume_by_source || {};
        }
        const total = Object.values(sources).reduce((s, v) => s + v, 0);
        const count = Object.keys(sources).length;
        headerEl.innerHTML = `${t('source_distribution')}`;
        subtitleEl.innerHTML = `${total} ${t('mentions_from')} ${count} ${t('source_categories')}`;
        // Restore footnote
        if (footnoteEl) {
            const entries = Object.entries(sources).sort((a, b) => b[1] - a[1]);
            const topPct = total > 0 && entries.length > 0 ? Math.round(entries[0][1] / total * 100) : 0;
            const topName = entries.length > 0 ? entries[0][0] : '';
            footnoteEl.innerHTML = topPct >= 50 ? `<div style="font-size:11px;color:var(--gray-400);margin-top:8px;text-align:center;">${topPct}% ${t('source_coverage_note').replace('{source}', topName)}</div>` : '';
        }
    }
}

function sourceChartBack() {
    window.__sourceChartDrillCategory = null;
    window.__activeSource = 'all';
    updateSourceChartHeader();
    initSourcesChart();
    applyGlobalCategoryFilter();
}

function clearSourceFilter() {
    window.__activeSource = 'all';
    updateSourceChartHeader();
    initSourcesChart();
    applyGlobalCategoryFilter();
}

function initSovChartWith(catKey) {
    const el = document.getElementById('sovChart');
    if (!el) return;
    const pi = DASHBOARD_DATA.product_intelligence || {};
    let beurerTotal, compEntries;

    if (catKey !== 'all') {
        const allComp = pi.competitors || {};
        const filtered = {};
        Object.entries(allComp).forEach(([name, data]) => {
            const brandCats = Object.entries(BRAND_CAT_MAP).find(([b]) => name.startsWith(b) || name.includes(b));
            if (brandCats && brandCats[1].includes(catKey)) filtered[name] = data;
        });
        compEntries = Object.entries(filtered).sort((a, b) => b[1].count - a[1].count);
        const beurerProds = pi.own || pi.beurer || {};
        const BEURER_CAT = { blood_pressure: 'BM,BC', pain_tens: 'EM', menstrual: 'EM', infrarot: 'IL' };
        const prefixes = (BEURER_CAT[catKey] || '').split(',');
        beurerTotal = Object.entries(beurerProds)
            .filter(([name]) => prefixes.some(p => name.startsWith(p)))
            .reduce((s, [, d]) => s + (d.count || 0), 0);
    } else {
        beurerTotal = pi.own_total || pi.beurer_total || 0;
        compEntries = Object.entries(pi.competitors || {}).sort((a, b) => b[1].count - a[1].count);
    }

    const companyLabel = 'BILD Pauschalreisen';
    const labels = [companyLabel + ' (' + beurerTotal + ')'];
    const data = [beurerTotal];
    const colors = [CHART_COLORS.magenta];
    const compColors = [CHART_COLORS.gray500, CHART_COLORS.info, CHART_COLORS.gray300, CHART_COLORS.warning];

    compEntries.forEach((e, i) => {
        labels.push(`${e[0]} (${e[1].count})`);
        data.push(e[1].count);
        colors.push(compColors[i % compColors.length]);
    });

    // Store brand names for click handler
    const brandNames = ['__beurer__', ...compEntries.map(e => e[0])];

    chartInstances.push(new Chart(el, {
        type: 'doughnut',
        data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 0, hoverOffset: 6 }] },
        options: {
            ...CHART_PRESET.doughnut,
            onHover: (evt, elements) => { evt.native.target.style.cursor = elements.length ? 'pointer' : 'default'; },
            onClick: (evt, elements) => {
                if (!elements.length) return;
                const idx = elements[0].index;
                const brand = brandNames[idx];
                if (brand === '__beurer__') return; // own brand — no drilldown
                // Find and expand the matching competitor mentions section
                const headers = document.querySelectorAll('#compContent .expandable-header h4');
                headers.forEach(h => {
                    if (h.textContent.includes(brand)) {
                        const header = h.closest('.expandable-header');
                        const body = header.nextElementSibling;
                        if (body && !body.classList.contains('open')) {
                            header.click();
                        }
                        header.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
            }
        }
    }));
}
